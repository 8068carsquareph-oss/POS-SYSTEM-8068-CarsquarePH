    // ======================== TRANSACTION TRACKING ========================
    function renderTransactionTracking() {
        if(showLogin) return renderLogin();
        recalculateAllCommissions();
        const now = new Date();
        let filteredTx = [], filterLabel = 'Today';
        if (transactionFilter === 'daily') {
            const todayStr = now.toISOString().slice(0,10);
            filteredTx = appData.transactions.filter(t => t.date.startsWith(todayStr));
            filterLabel = 'Today';
        } else if (transactionFilter === 'weekly') {
            const weekStart = getWeekStart(now);
            const weekStartStr = weekStart.toISOString().slice(0,10);
            filteredTx = appData.transactions.filter(t => t.date >= weekStartStr);
            filterLabel = `This Week (${getWeekLabel(now)})`;
        } else if (transactionFilter === 'monthly') {
            const month = now.getMonth(), year = now.getFullYear();
            filteredTx = appData.transactions.filter(t => { const d = new Date(t.date); return d.getMonth() === month && d.getFullYear() === year; });
            filterLabel = `${now.toLocaleString('default', { month: 'long' })} ${year}`;
        } else if (transactionFilter === 'yearly') {
            const year = now.getFullYear();
            filteredTx = appData.transactions.filter(t => new Date(t.date).getFullYear() === year);
            filterLabel = `Year ${year}`;
        }
        filteredTx.sort((a, b) => new Date(b.date) - new Date(a.date));
        const summary = calculateTransactionSummary(filteredTx);
        let txRows = filteredTx.map((t, idx) => {
            const staffNames = t.items.flatMap(i => i.assignedStaff?.map(s => s.name) || []).filter((v,i,a) => a.indexOf(v)===i).join(', ') || 'Unassigned';
            const size = t.items.map(i => i.variant).join(', ') || 'N/A';
            const serviceAvailed = t.items.map(i => i.serviceName).join(', ') || 'N/A';
            const isCredit = t.paymentMethod === 'Credit (Utang)' || t.isCredit;
            let txCommission = 0;
            if (t.staffCommissions) {
                txCommission = Object.values(t.staffCommissions).reduce((sum, st) => sum + (st.commission || 0), 0);
            }
            const customer = appData.customers.find(c => c.name === t.customer);
            const customerId = customer?.id || '';
            const paymentClass = t.paymentMethod === 'Cash' ? 'payment-cash' : 
                                t.paymentMethod === 'GCash' || t.paymentMethod === 'Maya' ? 'payment-gcash' :
                                t.paymentMethod === 'Credit Card' ? 'payment-card' :
                                t.paymentMethod === 'Credit (Utang)' ? 'payment-credit' : 'payment-other';
            return `<tr class="border-b border-gray-700 tx-row-clickable ${isCredit ? 'credit-row' : ''}" onclick="openTransactionEdit('${t.id}')">
                <td class="py-2 text-center text-xs text-gray-400">${idx + 1}</td>
                <td class="py-2 font-mono text-xs"><span class="receipt-link" onclick="event.stopPropagation();openTransactionEdit('${t.id}')">${t.id}</span></td>
                <td class="py-2 text-xs">${new Date(t.date).toLocaleString()}</td>
                <td class="editable-field" onclick="event.stopPropagation();editTransactionCustomer('${t.id}')">${customerId ? `<a href="#" class="customer-profile-link" onclick="event.stopPropagation();viewCustomerHistory(${customerId})">${t.customer}</a>` : t.customer}</td>
                <td class="editable-field" onclick="event.stopPropagation();editTransactionVehicle('${t.id}')">${t.vehicle}</td>
                <td class="editable-field" onclick="event.stopPropagation();editTransactionPlate('${t.id}')">${t.plate}</td>
                <td class="text-xs">${size}</td>
                <td class="text-xs">${serviceAvailed}</td>
                <td class="text-xs">${staffNames}</td>
                <td class="text-green-400 font-bold editable-field" onclick="event.stopPropagation();editTransactionAmount('${t.id}')">₱${t.total.toFixed(2)}</td>

    };
    window.editTransactionVehicle = (id) => {
        const t = appData.transactions.find(tx => tx.id === id);

    };

        const t = appData.transactions.find(tx => tx.id === id);

    };

        const t = appData.transactions.find(tx => tx.id === id);
        if(t) { const newAmt = parseFloat(prompt("Edit total amount:", t.total)); if(!isNaN(newAmt) && newAmt > 0) { t.total = newAmt; t.subtotal = newAmt; saveToLocal(); refreshAllCommissions(); generateTransactionReports(); addAuditLog('edit', `Transaction ${t.id}`, `Edited amount to ₱${newAmt}`); renderApp(); } }
    };
    window.editTransactionPayment = (id) => {
        const t = appData.transactions.find(tx => tx.id === id);

            const methods = appData.systemSettings.defaultPaymentMethods || ['Cash', 'GCash', 'Maya', 'Credit Card', 'Bank Transfer', 'Credit (Utang)'];
            const newVal = prompt("Edit payment method:", t.paymentMethod || 'Cash');

                t.paymentMethod = newVal;

                saveToLocal(); addAuditLog('edit', `Transaction ${t.id}`, `Edited payment to ${newVal}`); renderApp();

        const t = appData.transactions.find(tx => tx.id === id);

        let modalHtml = `<div id="adminModal" class="modal"><div class="modal-content">
            <h3 class="text-xl font-bold mb-4">Edit Transaction</h3>
            <div class="space-y-3">
                <div><label class="text-gray-400">Customer</label><input type="text" id="editTxCustomer" class="w-full bg-gray-800 p-2 rounded" value="${t.customer}"></div>

                <div><label class="text-gray-400">Plate Number</label><input type="text" id="editTxPlate" class="w-full bg-gray-800 p-2 rounded" value="${t.plate}"></div>

                <div class="flex gap-3 mt-4"><button onclick="confirmEditTransaction('${id}')" class="btn-neon flex-1 p-2 rounded">Update</button><button onclick="closeAdminModal()" class="bg-gray-700 flex-1 p-2 rounded">Cancel</button></div>
            </div>
        </div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    window.confirmEditTransaction = (id) => {
        const customer = document.getElementById('editTxCustomer')?.value;
        const amount = parseFloat(document.getElementById('editTxAmount')?.value);
        const vehicle = document.getElementById('editTxVehicle')?.value;
        const plate = document.getElementById('editTxPlate')?.value;
        const payment = document.getElementById('editTxPayment')?.value;
        const remarks = document.getElementById('editTxRemarks')?.value;
        const t = appData.transactions.find(tx => tx.id === id);
        if(!t) return;
        if(customer) t.customer = customer;
        if(!isNaN(amount) && amount > 0) { t.total = amount; t.subtotal = amount; }
        if(vehicle) t.vehicle = vehicle;
        if(plate) t.plate = plate;
        if(payment) { t.paymentMethod = payment; if(payment === 'Credit (Utang)') t.isCredit = true; }
        if(remarks !== undefined) t.remarks = remarks;
        saveToLocal();
        refreshAllCommissions();
        generateTransactionReports();
        addAuditLog('edit', `Transaction ${t.id}`, `Updated transaction`);
        closeAdminModal();
        renderApp();
    };
    window.deleteTransactionAndCommission = (id) => {
        if (!confirm("Delete this transaction? This will remove associated commissions.")) return;
        const txIndex = appData.transactions.findIndex(t => t.id === id);
        if (txIndex === -1) return;
        const tx = appData.transactions[txIndex];
        appData.credits = appData.credits.filter(c => c.transactionId !== id);
        appData.transactions.splice(txIndex, 1);
        if (tx) {
            addActivityLog('Transaction Deleted', `${tx.id} - ₱${tx.total.toFixed(2)}`);
            addAuditLog('delete', `Transaction ${tx.id}`, `Deleted transaction by ${appData.currentUser?.name}`);
        }
        refreshAllCommissions();
        generateTransactionReports();
        saveToLocal();
        renderApp();
        alert("✅ Transaction deleted and commissions updated!");

    // ======================== REPORT SUMMARIES ========================
    function renderReportSummaries() {
        if(showLogin) return renderLogin();
        recalculateAllCommissions();
        generateTransactionReports();
        const today = new Date();
        const currentMonth = today.getMonth(), currentYear = today.getFullYear();
        const todayStr = today.toISOString().slice(0,10);
        const dailyTx = appData.transactions.filter(t => t.date.startsWith(todayStr));
        const dailySales = dailyTx.reduce((s,t)=>s+t.total,0);
        const dailyExpenses = appData.expenses.filter(e => e.date === todayStr).reduce((s,e)=>s+e.amount,0);
        const dailyCommission = appData.transactions.filter(t => t.date.startsWith(todayStr) && t.staffCommissions)
            .reduce((sum, t) => sum + Object.values(t.staffCommissions).reduce((s, st) => s + (st.commission || 0), 0), 0);
        const weekStart = getWeekStart(today);
        const weekStartStr = weekStart.toISOString().slice(0,10);
        const weekTx = appData.transactions.filter(t => t.date >= weekStartStr);
        const weeklySales = weekTx.reduce((s,t)=>s+t.total,0);
        const weeklyExpenses = appData.expenses.filter(e => e.date >= weekStartStr).reduce((s,e)=>s+e.amount,0);
        const weeklyCommission = appData.staff.reduce((sum, s) => sum + (s.weeklyCommission || 0), 0);
        const monthTx = appData.transactions.filter(t => new Date(t.date).getMonth() === currentMonth && new Date(t.date).getFullYear() === currentYear);
        const monthlySales = monthTx.reduce((s,t)=>s+t.total,0);
        const monthlyExpenses = appData.expenses.filter(e => new Date(e.date).getMonth() === currentMonth && new Date(e.date).getFullYear() === currentYear).reduce((s,e)=>s+e.amount,0);
        const monthlyCommission = appData.staff.reduce((sum, s) => sum + (s.monthlyCommission || 0), 0);
        const yearTx = appData.transactions.filter(t => new Date(t.date).getFullYear() === currentYear);
        const yearlySales = yearTx.reduce((s,t)=>s+t.total,0);
        const yearlyExpenses = appData.expenses.filter(e => new Date(e.date).getFullYear() === currentYear).reduce((s,e)=>s+e.amount,0);
        const yearlyCommission = appData.staff.reduce((sum, s) => sum + (s.yearlyCommission || 0), 0);
        const weekLabel = getWeekLabel(today);
        return `<div class="grid lg:grid-cols-2 gap-6">
            <div class="card-premium p-6">
                <h2 class="text-2xl font-bold mb-4"><i class="fas fa-chart-line"></i> ${appData.systemSettings.uiLabels.reportsTitle || 'Report Summaries'}</h2>

                    <button onclick="setReportPeriod('weekly')" class="px-3 py-1 rounded ${reportPeriod === 'weekly' ? 'bg-cyan-600' : 'bg-gray-700'} text-sm">Weekly</button>
                    <button onclick="setReportPeriod('monthly')" class="px-3 py-1 rounded ${reportPeriod === 'monthly' ? 'bg-cyan-600' : 'bg-gray-700'} text-sm">Monthly</button>
                    <button onclick="setReportPeriod('yearly')" class="px-3 py-1 rounded ${reportPeriod === 'yearly' ? 'bg-cyan-600' : 'bg-gray-700'} text-sm">Yearly</button>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-gray-800 p-3 rounded-lg text-center"><div class="stat-label">${reportPeriod === 'daily' ? 'Today' : reportPeriod === 'weekly' ? weekLabel : reportPeriod === 'monthly' ? `This Month (${today.toLocaleString('default', { month: 'long' })})` : `This Year (${currentYear})`} Sales</div><div class="stat-number text-green-400">₱${reportPeriod === 'daily' ? dailySales : reportPeriod === 'weekly' ? weeklySales : reportPeriod === 'monthly' ? monthlySales : yearlySales}</div></div>
                    <div class="bg-gray-800 p-3 rounded-lg text-center"><div class="stat-label">${reportPeriod === 'daily' ? 'Today' : reportPeriod === 'weekly' ? weekLabel : reportPeriod === 'monthly' ? `This Month (${today.toLocaleString('default', { month: 'long' })})` : `This Year (${currentYear})`} Expenses</div><div class="stat-number text-red-400">₱${reportPeriod === 'daily' ? dailyExpenses : reportPeriod === 'weekly' ? weeklyExpenses : reportPeriod === 'monthly' ? monthlyExpenses : yearlyExpenses}</div></div>
                    <div class="bg-gray-800 p-3 rounded-lg text-center"><div class="stat-label">${reportPeriod === 'daily' ? 'Today' : reportPeriod === 'weekly' ? weekLabel : reportPeriod === 'monthly' ? `This Month (${today.toLocaleString('default', { month: 'long' })})` : `This Year (${currentYear})`} Commission</div><div class="stat-number text-purple-400">₱${reportPeriod === 'daily' ? dailyCommission : reportPeriod === 'weekly' ? weeklyCommission : reportPeriod === 'monthly' ? monthlyCommission : yearlyCommission}</div></div>
                    <div class="bg-gray-800 p-3 rounded-lg text-center"><div class="stat-label">${reportPeriod === 'daily' ? 'Today' : reportPeriod === 'weekly' ? weekLabel : reportPeriod === 'monthly' ? `This Month (${today.toLocaleString('default', { month: 'long' })})` : `This Year (${currentYear})`} Profit</div><div class="stat-number text-cyan-400">₱${(reportPeriod === 'daily' ? dailySales - dailyExpenses : reportPeriod === 'weekly' ? weeklySales - weeklyExpenses : reportPeriod === 'monthly' ? monthlySales - monthlyExpenses : yearlySales - yearlyExpenses).toFixed(2)}</div></div>

    window.exportPeriodicReport = (period) => {
        const report = getPeriodicReport(period);
        if (!report || !report.staff) { alert('No report data available.'); return; }
        const data = Object.values(report.staff).map(s => ({
            name: s.name || 'Unknown', position: s.position || 'Staff', tier: `${s.tier || 0}%`,
            jobs: s.jobs || 0, sales: `₱${(s.sales || 0).toFixed(2)}`, commission: `₱${(s.commission || 0).toFixed(2)}`
        }));
        data.push({ name: 'TOTAL', position: '', tier: '', jobs: data.reduce((sum, d) => sum + (d.jobs || 0), 0),
            sales: `₱${(report.totals?.sales || 0).toFixed(2)}`, commission: `₱${(report.totals?.commission || 0).toFixed(2)}` });
        const columns = [
            { key: 'name', header: 'Staff Name' }, { key: 'position', header: 'Position' },
            { key: 'tier', header: 'Tier' }, { key: 'jobs', header: 'Jobs' },
            { key: 'sales', header: 'Sales' }, { key: 'commission', header: 'Commission' }
        ];
        const filename = `${period}_commission`;
        generateExcel(data, columns, `${period.charAt(0).toUpperCase() + period.slice(1)} Commission Report`, filename);
        generatePDF(data, columns, `${period.charAt(0).toUpperCase() + period.slice(1)} Commission Report`, filename, appData.systemSettings.companyLogo, appData.systemSettings.logoSize);
        generateCSV(data, columns, filename);
        addAuditLog('export', `${period} Commission Report`, `Exported ${period} commission report`);
    };

    window.confirmAddService = () => {
        const name = document.getElementById('newServiceName')?.value; if(!name) { alert("Name required!"); return; }
        const desc = document.getElementById('newServiceDesc')?.value || "";
        const category = document.getElementById('newServiceCat')?.value || "Specialty";
        const sizes = document.getElementById('newServiceSizes')?.value.split(',').map(s => s.trim());
        const pricesArr = document.getElementById('newServicePrices')?.value.split(',').map(p => parseFloat(p.trim()));
        const prices = {}; sizes.forEach((size, idx) => { if(pricesArr[idx]) prices[size] = pricesArr[idx]; });
        const newService = { id: Date.now(), name: name.toUpperCase(), desc, sizes, prices, category, isActive: true };
        appData.services.push(newService);
        sizes.forEach(size => {
            const price = prices[size];
            if (price) {
                const tier30 = Math.round(price * 0.26), tier35 = Math.round(price * 0.30), tier40 = Math.round(price * 0.35);
                const key = `${name.toUpperCase()}_${size}`;
                appData.commissionMatrix[key] = [tier30, tier35, tier40];
            }
        });
        saveToLocal(); closeAdminModal(); renderApp(); 
        addAuditLog('create', `Service ${name}`, `Added new service`);
        alert(`✅ Service "${name}" added!`);
    };

    window.editServiceName = (id) => { 
        let s = appData.services.find(s=>s.id===id); 
        if(s) { let newName = prompt("New name:", s.name); if(newName) { 
            const oldName = s.name; s.name = newName.toUpperCase(); 
            const newMatrix = {};
            Object.keys(appData.commissionMatrix).forEach(key => {
                if (key.startsWith(oldName)) { newMatrix[key.replace(oldName, s.name)] = appData.commissionMatrix[key]; } 
                else { newMatrix[key] = appData.commissionMatrix[key]; }
            });
            appData.commissionMatrix = newMatrix;
            saveToLocal(); renderApp(); 
        }} 
    };
    window.editServicePrice = (id) => { 
        let s = appData.services.find(s=>s.id===id); 
        if(s) { let size = prompt("Size to edit:", s.sizes[0]); let price = parseFloat(prompt("New price:")); 
            if(size && price) { s.prices[size] = price; 
                const key = `${s.name}_${size}`;
                const tier30 = Math.round(price * 0.26), tier35 = Math.round(price * 0.30), tier40 = Math.round(price * 0.35);
                appData.commissionMatrix[key] = [tier30, tier35, tier40];
                saveToLocal(); renderApp(); 
            }} 
    };
    window.toggleServiceStatus = (id) => { let s = appData.services.find(s=>s.id===id); if(s) { s.isActive = !s.isActive; saveToLocal(); renderApp(); } };
    window.deleteServiceItem = (id) => { 
        if(confirm("Delete this service?")) { 
            const service = appData.services.find(s => s.id === id); 
            if(service) { 
                Object.keys(appData.commissionMatrix).forEach(key => { if (key.startsWith(service.name)) { delete appData.commissionMatrix[key]; } });
                appData.services = appData.services.filter(s => s.id !== id);
                saveToLocal(); renderApp(); 
                addAuditLog('delete', `Service ${service.name}`, `Deleted service`);
            }} 
    };

    // ======================== ADMIN COMMISSIONS MATRIX ========================

        if(showLogin) return renderLogin();
        const commissionKeys = Object.keys(appData.commissionMatrix || {}).sort();
        const serviceNames = [...new Set(commissionKeys.map(k => k.split('_')[0]))];
        let tableHtml = '';
        serviceNames.forEach(serviceName => {
            const service = appData.services.find(s => s.name === serviceName);
            const sizes = service ? service.sizes : [];
            sizes.forEach(size => {
                const key = `${serviceName}_${size}`;
                const values = appData.commissionMatrix[key] || [0, 0, 0];
                tableHtml += `<tr class="border-b border-gray-700 hover:bg-gray-800 transition">

            </div>`;

        const values = appData.commissionMatrix[key] || [0, 0, 0];
        const tierLabels = ['30%', '35%', '40%'];

            values[tierIndex] = newVal;
            appData.commissionMatrix[key] = values;
            saveToLocal(); renderApp();
        }
    };

        const values = appData.commissionMatrix[key] || [0, 0, 0];

        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    window.confirmAddCommission = () => {
        const service = document.getElementById('addCommService')?.value;
        const size = document.getElementById('addCommSize')?.value;
        const val30 = parseFloat(document.getElementById('addComm30')?.value);
        const val35 = parseFloat(document.getElementById('addComm35')?.value);
        const val40 = parseFloat(document.getElementById('addComm40')?.value);
        if (!service || !size) { alert("Service and size required!"); return; }
        const key = `${service}_${size}`;
        if (!isNaN(val30) && !isNaN(val35) && !isNaN(val40)) {
            appData.commissionMatrix[key] = [val30, val35, val40];
            saveToLocal(); closeAdminModal(); renderApp();
        }
    };
    window.autoGenerateCommissions = () => {
        if(confirm("Auto-generate commissions based on service prices?")) {
            appData.services.forEach(service => {
                service.sizes.forEach(size => {
                    const price = service.prices[size];
                    if (price) {
                        const tier30 = Math.round(price * 0.26), tier35 = Math.round(price * 0.30), tier40 = Math.round(price * 0.35);
                        const key = `${service.name}_${size}`;
                        appData.commissionMatrix[key] = [tier30, tier35, tier40];
                    }
                });
            });
            saveToLocal(); renderApp(); alert("Commissions auto-generated!");
        }
    };
    window.resetCommissionMatrix = () => {
        if(confirm("Reset commission matrix to default?")) {
            appData.commissionMatrix = initializeCommissionMatrix();
            saveToLocal(); renderApp();
        }
    };

        let username = prompt("Username:"); if(!username) return;
        let password = prompt("Password:") || "password123";
        let name = prompt("Full name:") || username;
        let role = prompt("Role (Owner/Manager/Cashier/Staff):") || "Staff";
        appData.users.push({ id: Date.now(), username, password, role, name, isActive: true });
        addActivityLog('User Added', name);
        addAuditLog('create', `User ${name}`, `Added new user`);
        saveToLocal(); renderApp();
    };
    window.toggleUserStatus = (id) => { let u = appData.users.find(u=>u.id===id); if(u) { u.isActive = !u.isActive; saveToLocal(); renderApp(); } };
    window.deleteUser = (id) => { 
        if(confirm("Delete user?")) { 
            const u = appData.users.find(user => user.id === id);

                addActivityLog('User Deleted', u.name);
                addAuditLog('delete', `User ${u.name}`, `Deleted user`);
            }
            appData.users = appData.users.filter(u=>u.id!==id); 
            saveToLocal(); renderApp(); 
        } 
    };

    window.testFirebaseConfig = function() {
        const config = {
            apiKey: document.getElementById('fbApiKey')?.value?.trim() || '',
            authDomain: document.getElementById('fbAuthDomain')?.value?.trim() || '',
            databaseURL: document.getElementById('fbDbUrl')?.value?.trim() || '',
            projectId: document.getElementById('fbProjectId')?.value?.trim() || '',
            storageBucket: document.getElementById('fbStorageBucket')?.value?.trim() || '',
            messagingSenderId: document.getElementById('fbMessagingSenderId')?.value?.trim() || '',
            appId: document.getElementById('fbAppId')?.value?.trim() || ''
        };
        if (!config.apiKey || !config.databaseURL) { alert("Please enter at least API Key and Database URL"); return; }
        addFirebaseLog('🔍 Testing connection...', 'info');
        try {
            let testApp;
            try { testApp = firebase.initializeApp(config, 'testApp'); } catch(e) {
                if (e.message.includes('already exists')) { testApp = firebase.app('testApp'); } else { throw e; }
            }
            const testDb = firebase.database(testApp);
            const testRef = testDb.ref('_test_connection');
            testRef.set({ test: 'connection', timestamp: new Date().toISOString(), device: navigator.userAgent || 'unknown' })
                .then(() => {
                    addFirebaseLog('✅ Connection test successful!', 'success');
                    alert('✅ Firebase connection successful! Your credentials are valid.');
                    testDb.ref('_test_connection').remove();
                    try { firebase.app('testApp').delete(); } catch(e) {}
                }).catch((error) => {
                    addFirebaseLog(`❌ Connection test failed: ${error.message}`, 'error');
                    alert(`❌ Connection failed: ${error.message}\n\nCheck your Database URL and Security Rules.`);
                    try { firebase.app('testApp').delete(); } catch(e) {}
                });
        } catch(e) {
            addFirebaseLog(`❌ Test error: ${e.message}`, 'error');
            alert(`❌ Error: ${e.message}`);
        }
    };

    window.saveFirebaseConfig = function() {
        const config = {
            apiKey: document.getElementById('fbApiKey')?.value?.trim() || '',
            authDomain: document.getElementById('fbAuthDomain')?.value?.trim() || '',
            databaseURL: document.getElementById('fbDbUrl')?.value?.trim() || '',
            projectId: document.getElementById('fbProjectId')?.value?.trim() || '',
            storageBucket: document.getElementById('fbStorageBucket')?.value?.trim() || '',
            messagingSenderId: document.getElementById('fbMessagingSenderId')?.value?.trim() || '',
            appId: document.getElementById('fbAppId')?.value?.trim() || ''
        };
        if (!config.apiKey || !config.databaseURL) { alert("Please enter at least API Key and Database URL"); return; }
        firebaseConfig = config;
        localStorage.setItem("8068_firebase_config_v8", JSON.stringify(config));
        isUsingDemoConfig = false;
        try {
            if (firebaseApp) {
                try { firebaseApp.delete(); } catch(e) {}
                firebaseApp = null; firebaseDb = null; firebaseInitialized = false;
                isFirebasePrimary = false;
                firebaseListeners.forEach(ref => { try { ref.off(); } catch(e) {} });
                firebaseListeners = [];
            }
            initFirebase().then((success) => {
                if (success) {
                    setupFirebaseRealtimeListener();
                    closeAdminModal();
                    renderApp();
                    alert('✅ Firebase connected successfully! All data will now sync in real-time.');
                } else {
                    alert('❌ Failed to connect to Firebase. Check your configuration and try again.');
                }
            });
        } catch(e) { alert('❌ Firebase error: ' + e.message); }
    };

    window.editCreditCustomer = (id) => { const c = appData.credits.find(cr => cr.id === id); if(c) { const val = prompt("Edit customer name:", c.customerName); if(val !== null) { c.customerName = val; saveToLocal(); renderApp(); } } };
    window.editCreditContact = (id) => { const c = appData.credits.find(cr => cr.id === id); if(c) { const val = prompt("Edit contact:", c.contact || ''); if(val !== null) { c.contact = val; saveToLocal(); renderApp(); } } };
    window.editCreditAmount = (id) => { const c = appData.credits.find(cr => cr.id === id); if(c) { const val = parseFloat(prompt("Edit amount:", c.amount)); if(!isNaN(val) && val > 0) { const diff = val - c.amount; c.amount = val; c.balance = (c.balance || 0) + diff; saveToLocal(); renderApp(); } } };
    window.editCreditPaid = (id) => { const c = appData.credits.find(cr => cr.id === id); if(c) { const val = parseFloat(prompt("Edit paid amount:", c.paid || 0)); if(!isNaN(val) && val >= 0) { const newPaid = val; const paidDiff = newPaid - (c.paid || 0); c.paid = newPaid; c.balance = (c.balance || 0) - paidDiff; if (c.balance <= 0) { c.balance = 0; c.status = 'paid'; } saveToLocal(); renderApp(); } } };
    window.addCreditPayment = (id) => { const c = appData.credits.find(cr => cr.id === id); if(c) { const val = parseFloat(prompt("Enter payment amount:", 0)); if(!isNaN(val) && val > 0 && val <= (c.balance || 0)) { c.paid = (c.paid || 0) + val; c.balance = (c.balance || 0) - val; if (c.balance <= 0) { c.balance = 0; c.status = 'paid'; } saveToLocal(); renderApp(); alert(`✅ Payment of ₱${val.toFixed(2)} recorded. Remaining balance: ₱${c.balance.toFixed(2)}`); } else { alert("Invalid amount or exceeds balance."); } } };

        ];

        const methodOptions = paymentMethods.map(m => `<option>${m}</option>`).join('');

            <h3 class="text-xl font-bold mb-4">Add Manual Transaction</h3>
            <div class="space-y-3">
                <div><label class="text-gray-400">Customer</label><input type="text" id="txCustomerInput" class="w-full bg-gray-800 p-2 rounded" value="Walk-in Customer"></div>
                <div><label class="text-gray-400">Amount</label><input type="number" id="txAmountInput" class="w-full bg-gray-800 p-2 rounded" step="0.01"></div>
                <div><label class="text-gray-400">Vehicle Model</label><input type="text" id="txVehicleInput" class="w-full bg-gray-800 p-2 rounded" placeholder="Toyota Vios"></div>
                <div><label class="text-gray-400">Plate Number</label><input type="text" id="txPlateInput" class="w-full bg-gray-800 p-2 rounded"></div>
                <div><label class="text-gray-400">Payment Method</label><select id="txPaymentInput" class="w-full bg-gray-800 p-2 rounded">${methodOptions}</select></div>
                <div><label class="text-gray-400">Remarks</label><input type="text" id="txRemarksInput" class="w-full bg-gray-800 p-2 rounded"></div>
                <div class="flex gap-3 mt-4"><button onclick="confirmAddTransaction()" class="btn-neon flex-1 p-2 rounded">Add</button><button onclick="closeAdminModal()" class="bg-gray-700 flex-1 p-2 rounded">Cancel</button></div>
            </div>
        </div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    window.confirmAddTransaction = () => {
        const customer = document.getElementById('txCustomerInput')?.value || "Walk-in Customer";
        const amount = parseFloat(document.getElementById('txAmountInput')?.value);
        const vehicle = document.getElementById('txVehicleInput')?.value || "N/A";
        const plate = document.getElementById('txPlateInput')?.value || "N/A";
        const payment = document.getElementById('txPaymentInput')?.value || "Cash";
        const remarks = document.getElementById('txRemarksInput')?.value || "";
        if(isNaN(amount) || amount <= 0) { alert("Valid amount required!"); return; }
        const transaction = {
            id: generateReceiptNo(),
            date: new Date().toISOString(),
            customer: customer,
            vehicle: vehicle,
            plate: plate,
            items: [{ serviceName: "Manual Entry", variant: "Standard", price: amount, quantity: 1, total: amount, assignedStaff: [], remarks: "Manual transaction" }],
            subtotal: amount,
            discount: 0,
            loyaltyUsed: 0,
            total: amount,
            paymentMethod: payment,
            isCredit: payment === 'Credit (Utang)',
            cashTendered: payment === 'Cash' ? amount : 0,
            change: 0,
            remarks: remarks + (payment === 'Credit (Utang)' ? ' (CREDIT - PENDING)' : '')
        };
        appData.transactions.unshift(transaction);
        if (payment === 'Credit (Utang)') {
            appData.credits.push({
                id: 'CR-' + new Date().getFullYear() + '-' + (appData.nextIds.credit++),
                customerName: customer, contact: '', transactionId: transaction.id,
                amount: amount, paid: 0, balance: amount,
                date: new Date().toISOString().slice(0,10), status: 'pending'
            });
        }
        saveToLocal();
        refreshAllCommissions();
        generateTransactionReports();
        addActivityLog('Manual Transaction Added', `${transaction.id} - ₱${amount.toFixed(2)}`);
        addAuditLog('create', `Transaction ${transaction.id}`, `Manual transaction added: ₱${amount}`);
        closeAdminModal();
        renderApp();
        alert("✅ Transaction added!");
    };

    // ======================== MAIN RENDER ========================
    function renderApp() {
        if(showLogin) {
            document.getElementById("mainContent").innerHTML = renderLogin();
            return;
        }
        const main = document.getElementById("mainContent");
        if(!main) return;
        let content = "";
        if(currentView === "dashboard") content = renderDashboard();
        else if(currentView === "pos") content = renderPOS();
        else if(currentView === "openservices") content = renderOpenServices();
        else if(currentView === "customers") content = renderCustomers();
        else if(currentView === "staff") content = renderStaffDashboard();
        else if(currentView === "admin") content = renderAdminDashboard();
        else if(currentView === "reports") content = renderReportSummaries();
        else if(currentView === "commission") content = renderCommissionReports();
        main.innerHTML = content;
        setTimeout(() => {
            document.getElementById('plateInput')?.addEventListener('input', (e) => vehicleInfo.plate = e.target.value);
            document.getElementById('modelInput')?.addEventListener('input', (e) => vehicleInfo.model = e.target.value);
            handlePaymentChange();
        }, 50);
        updateClock();
        saveToLocal();
    }

    // ======================== LIVE CLOCK ========================
    function updateClock() {
        const now = new Date();
        const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
        const clockEl = document.getElementById('liveClock');
        if(clockEl) clockEl.textContent = now.toLocaleDateString('en-US', options);
    }
    setInterval(updateClock, 1000);

    // ======================== INACTIVITY TIMER ========================
    function resetInactivityTimer() {
        if (inactivityTimer) { clearTimeout(inactivityTimer); }
        const timeout = (appData.systemSettings.inactivityTimeout || 30) * 60 * 1000;
        inactivityTimer = setTimeout(() => {
            if (!showLogin && appData.currentUser) {
                addActivityLog('Auto-Logout', `User ${appData.currentUser.name} was auto-logged out due to inactivity`);
                addAuditLog('logout', 'System', `Auto-logout due to inactivity`);
                alert('You have been logged out due to inactivity.');
                logout();
            }
        }, timeout);
    }
    document.addEventListener('click', resetInactivityTimer);

    document.addEventListener('mousemove', resetInactivityTimer);
