<script>
    // ======================== FIREBASE CONFIGURATION ========================
    let firebaseConfig = {
        apiKey: "",
        authDomain: "",
        databaseURL: "",
        projectId: "",
        storageBucket: "",
        messagingSenderId: "",
        appId: ""
    };

    const savedConfig = localStorage.getItem("8068_firebase_config_v8");
    if (savedConfig) {
        try {
            firebaseConfig = JSON.parse(savedConfig);
        } catch(e) {}
    }

    let firebaseApp = null;
    let firebaseDb = null;
    let firebaseInitialized = false;
    let firebaseListeners = [];
    let firebaseIsSyncing = false;
    let firebaseRetryCount = 0;
    let firebaseTotalSynced = 0;
    const MAX_RETRIES = 3;
    const RETRY_DELAY = 1500;
    let firebaseLogs = [];
    let isFirebasePrimary = false;
    let dataLoaded = false;
    let pendingSyncQueue = [];
    let syncTimer = null;
    let isInitialLoad = true;

    function sanitizeDataForFirebase(data) {
        if (data === undefined) return null;
        if (data === null) return null;
        if (typeof data !== 'object') return data;
        
        if (Array.isArray(data)) {
            return data.map(item => sanitizeDataForFirebase(item));
        }
        
        const cleaned = {};
        for (const key in data) {
            if (data[key] === undefined) {
                cleaned[key] = null;
            } else if (data[key] === null) {
                cleaned[key] = null;
            } else if (typeof data[key] === 'object') {
                cleaned[key] = sanitizeDataForFirebase(data[key]);
            } else {
                cleaned[key] = data[key];
            }
        }
        return cleaned;
    }

    function addFirebaseLog(message, type = 'info') {
        const timestamp = new Date().toLocaleTimeString();
        firebaseLogs.push({ message, type, timestamp });
        if (firebaseLogs.length > 100) firebaseLogs.shift();
        updateLogConsole();
        console.log(`[Firebase ${type}] ${message}`);
    }

    function updateLogConsole() {
        const logEl = document.getElementById('firebaseLogConsole');
        if (logEl) {
            logEl.innerHTML = firebaseLogs.slice(-30).map(log => 
                `<div class="${log.type}">[${log.timestamp}] ${log.message}</div>`
            ).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }
    }

    function initFirebase() {
        addFirebaseLog('Initializing Firebase as primary storage...', 'info');
        
        if (!firebaseConfig.apiKey || !firebaseConfig.databaseURL) {
            addFirebaseLog('❌ Firebase config missing. Please configure.', 'error');
            updateFirebaseStatus('offline', 'Not Configured');
            return Promise.resolve(false);
        }

        try {
            try {
                firebaseApp = firebase.app();
                addFirebaseLog('✅ Using existing Firebase app', 'success');
            } catch(e) {
                firebaseApp = firebase.initializeApp(firebaseConfig);
                addFirebaseLog('✅ Firebase app initialized', 'success');
            }

                            addFirebaseLog('⚠️ Firebase disconnected', 'warn');

                            updateFirebaseStatus('offline', 'Disconnected');
                            if (!dataLoaded) {
                                loadLocalData();

                        }
                    }

                    if (snap.val() === true) {
                        firebaseInitialized = true;
                        isFirebasePrimary = true;
                        addFirebaseLog('✅ Firebase connected as PRIMARY', 'success');
                        updateFirebaseStatus('online', 'Primary');
                        setupFirebaseRealtimeListener();
                        if (isInitialLoad) {
                            isInitialLoad = false;
                            loadAllDataFromFirebase();
                        }
                        resolve(true);
                    } else {
                        setTimeout(() => {
                            connRef.once('value', (snap2) => {
                                if (snap2.val() === true) {
                                    firebaseInitialized = true;
                                    isFirebasePrimary = true;
                                    addFirebaseLog('✅ Firebase connected as PRIMARY', 'success');
                                    updateFirebaseStatus('online', 'Primary');

    function loadAllDataFromFirebase() {
        if (!firebaseDb) return;
        
        addFirebaseLog('📥 Loading data from Firebase...', 'info');
        updateFirebaseStatus('syncing', 'Loading...');
        
        firebaseDb.ref('8068_pos_system_v8').once('value')
            .then((snapshot) => {
                const data = snapshot.val();
                if (data) {
                    addFirebaseLog(`📦 Received ${Object.keys(data).length} collections`, 'info');
                    let hasChanges = false;
                    const skipKeys = ['lastUpdated', 'version', '_test_connection'];
                    Object.keys(data).forEach(key => {
                        if (skipKeys.includes(key)) return;
                        if (appData[key] !== undefined && data[key] !== null) {
                            const localStr = JSON.stringify(appData[key]);
                            const remoteStr = JSON.stringify(data[key]);
                            if (localStr !== remoteStr) {
                                appData[key] = data[key];
                                hasChanges = true;
                            }
                        }
                    });
                    if (data.users) {
                        data.users.forEach(remoteUser => {
                            const localUser = appData.users.find(u => u.id === remoteUser.id);
                            if (localUser && remoteUser.password) {
                                remoteUser.password = localUser.password;
                            }
                        });
                        if (JSON.stringify(appData.users) !== JSON.stringify(data.users)) {
                            appData.users = data.users;
                            hasChanges = true;
                        }
                    }
                    if (data.currentUser) {
                        const localUser = appData.users.find(u => u.id === data.currentUser.id);
                        if (localUser) {
                            if (appData.currentUser?.id !== localUser.id) {
                                appData.currentUser = localUser;
                                hasChanges = true;
                            }
                        } else {
                            if (appData.currentUser?.id !== data.currentUser.id) {
                                appData.currentUser = data.currentUser;
                                hasChanges = true;
                            }
                        }
                    }
                    dataLoaded = true;
                    if (hasChanges) {
                        saveToLocal();
                        addFirebaseLog('✅ Data loaded from Firebase', 'success');
                        updateFirebaseStatus('online', 'Primary');
                        renderApp();
                    } else {
                        addFirebaseLog('✅ Data already up to date', 'success');
                        updateFirebaseStatus('online', 'Primary');
                    }
                    return true;
                } else {
                    addFirebaseLog('ℹ️ No data in Firebase, uploading...', 'info');
                    return syncToFirebase(true);
                }
            })
            .catch((error) => {
                addFirebaseLog(`❌ Load error: ${error.message}`, 'error');
                updateFirebaseStatus('error', 'Load Failed');
                loadLocalData();
                return false;
            });
    }

    function syncToFirebase(force = false) {
        if (!firebaseInitialized || !firebaseDb) {
            addFirebaseLog('❌ Cannot sync: Firebase not ready', 'error');
            return Promise.reject('Firebase not ready');
        }

        if (firebaseIsSyncing && !force) {
            return Promise.resolve('Already syncing');
        }

        firebaseIsSyncing = true;
        updateFirebaseStatus('syncing', 'Syncing...');
        addFirebaseLog('🔄 Syncing to Firebase...', 'info');

        const rawData = {
            services: appData.services || [],
            categories: appData.categories || [],
            customers: appData.customers || [],
            transactions: appData.transactions || [],
            openServices: appData.openServices || [],
            staff: appData.staff || [],
            expenses: appData.expenses || [],
            credits: appData.credits || [],
            inventory: appData.inventory || [],
            systemSettings: appData.systemSettings || {},
            users: appData.users || [],
            currentUser: appData.currentUser || null,
            nextIds: appData.nextIds || {},
            commissionMatrix: appData.commissionMatrix || {},
            commissionReports: appData.commissionReports || [],
            weeklyCommissionReports: appData.weeklyCommissionReports || [],
            lastUpdated: new Date().toISOString(),
            version: '8.7'
        };

        const dataToSync = sanitizeDataForFirebase(rawData);
        const dataSize = JSON.stringify(dataToSync).length;
        addFirebaseLog(`📦 Syncing ${Object.keys(dataToSync).length} collections (${Math.round(dataSize/1024)} KB)`, 'info');

        return firebaseDb.ref('8068_pos_system_v8').set(dataToSync)
            .then(() => {
                firebaseIsSyncing = false;
                firebaseRetryCount = 0;
                firebaseTotalSynced++;
                localStorage.setItem('8068_last_sync_v8', new Date().toISOString());
                addFirebaseLog('✅ Sync completed!', 'success');
                updateFirebaseStatus('online', 'Primary');
                const syncEl = document.getElementById('syncStatus');
                if (syncEl) {
                    const countEl = syncEl.querySelector('.sync-count');
                    if (countEl) countEl.textContent = firebaseTotalSynced;
                }
                return true;
            })
            .catch((error) => {
                firebaseIsSyncing = false;
                addFirebaseLog(`❌ Sync error: ${error.message}`, 'error');
                firebaseRetryCount++;
                if (firebaseRetryCount < MAX_RETRIES) {
                    addFirebaseLog(`🔄 Retry ${firebaseRetryCount}/${MAX_RETRIES}...`, 'warn');
                    updateFirebaseStatus('syncing', `Retry ${firebaseRetryCount}...`);
                    return new Promise((resolve) => {
                        setTimeout(() => {
                            resolve(syncToFirebase(true));
                        }, RETRY_DELAY);
                    });
                } else {
                    updateFirebaseStatus('error', 'Sync Failed');
                    return false;
                }
            });
    }

    function debouncedSync() {
        if (syncTimer) {
            clearTimeout(syncTimer);
        }
        syncTimer = setTimeout(() => {
            syncTimer = null;
            if (firebaseInitialized && isFirebasePrimary && !firebaseIsSyncing) {
                syncToFirebase();
            }
        }, 500);
    }

    function setupFirebaseRealtimeListener() {
        if (!firebaseInitialized || !firebaseDb) return;

        firebaseListeners.forEach(ref => { try { ref.off(); } catch(e) {} });
        firebaseListeners = [];

        addFirebaseLog('🔌 Setting up real-time listener...', 'info');

        const ref = firebaseDb.ref('8068_pos_system_v8');
        ref.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && !firebaseIsSyncing && isFirebasePrimary) {
                addFirebaseLog('🔄 Real-time update received', 'info');
                let hasChanges = false;
                const skipKeys = ['lastUpdated', 'version', '_test_connection'];
                Object.keys(data).forEach(key => {
                    if (skipKeys.includes(key)) return;
                    if (appData[key] !== undefined && data[key] !== null) {
                        const localStr = JSON.stringify(appData[key]);
                        const remoteStr = JSON.stringify(data[key]);
                        if (localStr !== remoteStr) {
                            appData[key] = data[key];
                            hasChanges = true;
                        }
                    }
                });
                if (hasChanges) {
                    saveToLocal();
                    addFirebaseLog('✅ Data updated from real-time sync', 'success');
                    updateFirebaseStatus('online', 'Primary');
                    renderApp();
                }
            }
        }, (error) => {
            addFirebaseLog(`⚠️ Listener error: ${error.message}`, 'warn');
        });
        firebaseListeners.push(ref);
        addFirebaseLog('✅ Real-time listener active', 'success');
    }

            s.monthlyBreakdown = {};
            s.yearlyBreakdown = {};
            s.weeklyDates = {};
        });

        appData.transactions.forEach(t => {
            if (t.staffCommissions) {
                const txDate = new Date(t.date);
                const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][txDate.getDay()];
                const dateStr = t.date.slice(0,10);
                const monthKey = `${txDate.getFullYear()}-${String(txDate.getMonth() + 1).padStart(2, '0')}`;
                const yearKey = `${txDate.getFullYear()}`;
                
                Object.entries(t.staffCommissions).forEach(([staffId, data]) => {
                    const staff = appData.staff.find(s => s.id === parseInt(staffId));
                    if (staff) {
                        const commission = data.commission || 0;
                        staff.totalCommission = (staff.totalCommission || 0) + commission;
                        staff.jobsCompleted = (staff.jobsCompleted || 0) + (data.jobs || 1);
                        staff.salesGenerated = (staff.salesGenerated || 0) + (t.total || 0);
                        if (staff.weeklyBreakdown) {
                            staff.weeklyBreakdown[dayName] = (staff.weeklyBreakdown[dayName] || 0) + commission;
                        }
                        if (!staff.weeklyDates) staff.weeklyDates = {};
                        staff.weeklyDates[dateStr] = (staff.weeklyDates[dateStr] || 0) + commission;
                        staff.monthlyCommission = (staff.monthlyCommission || 0) + commission;
                        staff.dailyCommission = (staff.dailyCommission || 0) + commission;
                        
                        if (!staff.monthlyBreakdown) staff.monthlyBreakdown = {};
                        staff.monthlyBreakdown[monthKey] = (staff.monthlyBreakdown[monthKey] || 0) + commission;
                        
                        if (!staff.yearlyBreakdown) staff.yearlyBreakdown = {};
                        staff.yearlyBreakdown[yearKey] = (staff.yearlyBreakdown[yearKey] || 0) + commission;
                    }
                });
            }
        });

        appData.staff.forEach(s => {
            if (s.weeklyBreakdown) {
                s.weekPart1Total = (s.weeklyBreakdown.Sunday || 0) + (s.weeklyBreakdown.Monday || 0) + (s.weeklyBreakdown.Tuesday || 0);
                s.weekPart2Total = (s.weeklyBreakdown.Wednesday || 0) + (s.weeklyBreakdown.Thursday || 0) + (s.weeklyBreakdown.Friday || 0) + (s.weeklyBreakdown.Saturday || 0);
            }
        });

        saveToLocal();
    }

    // ======================== WEEKLY COMMISSION REPORT WITH FULL CRUD ========================
    function generateWeeklyCommissionReport() {
        recalculateStaffCommissions();
        const now = new Date();
        const weekStart = new Date(now);
        weekStart.setDate(now.getDate() - now.getDay());
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 6);
        
        const weekDays = [];
        const weekDayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        for (let d = new Date(weekStart); d <= weekEnd; d.setDate(d.getDate() + 1)) {
            weekDays.push({
                date: new Date(d),
                dateStr: d.toISOString().slice(0,10),
                dayName: weekDayNames[d.getDay()],
                label: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
            });
        }

        const reportData = appData.staff.filter(s => s.isActive !== false).map(s => {
            const dayTotals = {};
            weekDays.forEach(day => {
                dayTotals[day.dayName] = s.weeklyDates?.[day.dateStr] || 0;
            });
            const total = Object.values(dayTotals).reduce((sum, val) => sum + val, 0);
            const part1 = (dayTotals.Sunday || 0) + (dayTotals.Monday || 0) + (dayTotals.Tuesday || 0);
            const part2 = (dayTotals.Wednesday || 0) + (dayTotals.Thursday || 0) + (dayTotals.Friday || 0) + (dayTotals.Saturday || 0);
            
            return {
                staffId: s.id,
                name: s.name,
                position: s.position,
                tier: s.commissionTier,
                jobs: s.jobsCompleted || 0,
                sales: s.salesGenerated || 0,
                ...dayTotals,
                part1: part1,
                part2: part2,
                total: total,
                weekDays: weekDays
            };
        });

        const grandTotals = {};
        weekDays.forEach(day => {
            grandTotals[day.dayName] = reportData.reduce((sum, r) => sum + (r[day.dayName] || 0), 0);
        });
        const grandPart1 = (grandTotals.Sunday || 0) + (grandTotals.Monday || 0) + (grandTotals.Tuesday || 0);
        const grandPart2 = (grandTotals.Wednesday || 0) + (grandTotals.Thursday || 0) + (grandTotals.Friday || 0) + (grandTotals.Saturday || 0);
        const grandTotal = Object.values(grandTotals).reduce((sum, val) => sum + val, 0);
        const grandJobs = reportData.reduce((sum, r) => sum + r.jobs, 0);
        const grandSales = reportData.reduce((sum, r) => sum + r.sales, 0);

        const reportId = `WEEKLY-${weekStart.toISOString().slice(0,10)}`;
        
        const report = {
            id: reportId,
            period: 'weekly',
            periodLabel: `${weekStart.toISOString().slice(0,10)} to ${weekEnd.toISOString().slice(0,10)}`,
            weekStart: weekStart.toISOString(),
            weekEnd: weekEnd.toISOString(),
            weekDays: weekDays.map(d => ({ dateStr: d.dateStr, dayName: d.dayName, label: d.label })),
            generatedAt: new Date().toISOString(),
            data: reportData,
            grandTotals: {
                ...grandTotals,
                part1: grandPart1,
                part2: grandPart2,
                total: grandTotal,
                jobs: grandJobs,
                sales: grandSales
            }
        };

        // Save to Firebase - update or insert
        const existingIdx = appData.weeklyCommissionReports.findIndex(r => r.id === reportId);
        if (existingIdx !== -1) {
            appData.weeklyCommissionReports[existingIdx] = report;
        } else {
            appData.weeklyCommissionReports.push(report);
        }
        saveToLocal();
        return report;
    }

    // ======================== EXPORT FUNCTIONS ========================
    function getFilteredTransactions(period) {
        const now = new Date();
        let filtered = [];
        if (period === 'daily') {
            const todayStr = now.toISOString().slice(0,10);
            filtered = appData.transactions.filter(t => t.date.startsWith(todayStr));
        } else if (period === 'weekly') {
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            const weekStartStr = weekStart.toISOString().slice(0,10);
            filtered = appData.transactions.filter(t => t.date >= weekStartStr);
        } else if (period === 'monthly') {
            const month = now.getMonth();
            const year = now.getFullYear();
            filtered = appData.transactions.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === month && d.getFullYear() === year;
            });
        } else if (period === 'yearly') {
            const year = now.getFullYear();
            filtered = appData.transactions.filter(t => new Date(t.date).getFullYear() === year);
        }
        return filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function getFilteredOpenServices(status) {
        if (status === 'all') return appData.openServices;
        return appData.openServices.filter(s => s.status === status);
    }

    function generateExcel(data, columns, title, filename) {
        const wb = XLSX.utils.book_new();
        const wsData = [columns.map(c => c.header)];
        data.forEach(row => {
            wsData.push(columns.map(c => row[c.key] !== undefined ? row[c.key] : ''));
        });
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        ws['!cols'] = columns.map(() => ({ wch: 20 }));
        ws['!rows'] = [{ hpx: 30 }];
        XLSX.utils.book_append_sheet(wb, ws, title);
        XLSX.writeFile(wb, `${filename}_${new Date().toISOString().slice(0,10)}.xlsx`);
        return true;
    }

    function generateCSV(data, columns, filename) {
        let csv = columns.map(c => c.header).join(',') + '\n';
        data.forEach(row => {
            csv += columns.map(c => `"${row[c.key] !== undefined ? row[c.key] : ''}"`).join(',') + '\n';
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${filename}_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        return true;
    }

    function generatePDF(data, columns, title, filename, logo) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        
        if (logo) {
            try {
                doc.addImage(logo, 'JPEG', pageWidth/2 - 20, 5, 40, 20);
            } catch(e) {}
        }
        
        doc.setFontSize(16);
        doc.text(title, pageWidth/2, 30, { align: 'center' });
        doc.setFontSize(10);
        doc.text(`Generated: ${new Date().toLocaleString()}`, pageWidth/2, 38, { align: 'center' });
        doc.text(`Company: ${appData.systemSettings.companyName}`, pageWidth/2, 44, { align: 'center' });
        
        const tableData = data.map(row => columns.map(c => row[c.key] !== undefined ? row[c.key] : ''));
        doc.autoTable({
            head: [columns.map(c => c.header)],
            body: tableData,
            startY: 50,
            styles: { fontSize: 7, cellPadding: 2 },
            headStyles: { fillColor: [0, 212, 255], textColor: [0,0,0], fontStyle: 'bold' },
            alternateRowStyles: { fillColor: [240, 240, 240] },
            didDrawPage: function(data) {
                doc.setFontSize(8);
                doc.text(`Page ${data.pageNumber}`, pageWidth - 20, doc.internal.pageSize.getHeight() - 10);
            }
        });
        doc.save(`${filename}_${new Date().toISOString().slice(0,10)}.pdf`);
        return true;
    }

    window.testFirebaseConfig = function() {
        const config = {
            apiKey: document.getElementById('fbApiKey')?.value?.trim() || '',
            authDomain: document.getElementById('fbAuthDomain')?.value?.trim() || '',
            databaseURL: document.getElementById('fbDbUrl')?.value?.trim() || '',
            projectId: document.getElementById('fbProjectId')?.value?.trim() || '',
            storageBucket: document.getElementById('fbStorageBucket')?.value?.trim() || '',
            messagingSenderId: document.getElementById('fbMessagingSenderId')?.value?.trim() || '',
            appId: document.getElementById('fbAppId')?.value?.trim() || ''
        };

        if (!config.apiKey || !config.databaseURL) {
            alert("Please enter at least API Key and Database URL");
            return;
        }

        addFirebaseLog('🔍 Testing connection...', 'info');
        
        try {
            let testApp;
            try {
                testApp = firebase.initializeApp(config, 'testApp');
            } catch(e) {
                if (e.message.includes('already exists')) {
                    testApp = firebase.app('testApp');
                } else {
                    throw e;
                }
            }
            const testDb = firebase.database(testApp);
            const testRef = testDb.ref('_test_connection');
            
            testRef.set({
                test: 'connection',
                timestamp: new Date().toISOString(),
                device: navigator.userAgent || 'unknown'
            }).then(() => {
                addFirebaseLog('✅ Connection test successful!', 'success');
                alert('✅ Firebase connection successful! Your credentials are valid.');
                testDb.ref('_test_connection').remove();
                try { firebase.app('testApp').delete(); } catch(e) {}
            }).catch((error) => {
                addFirebaseLog(`❌ Connection test failed: ${error.message}`, 'error');
                alert(`❌ Connection failed: ${error.message}\n\nCheck your Database URL and Security Rules.`);
                try { firebase.app('testApp').delete(); } catch(e) {}
            });
        } catch(e) {
            addFirebaseLog(`❌ Test error: ${e.message}`, 'error');
            alert(`❌ Error: ${e.message}`);
        }
    };

    window.saveFirebaseConfig = function() {
        const config = {
            apiKey: document.getElementById('fbApiKey')?.value?.trim() || '',
            authDomain: document.getElementById('fbAuthDomain')?.value?.trim() || '',
            databaseURL: document.getElementById('fbDbUrl')?.value?.trim() || '',
            projectId: document.getElementById('fbProjectId')?.value?.trim() || '',
            storageBucket: document.getElementById('fbStorageBucket')?.value?.trim() || '',
            messagingSenderId: document.getElementById('fbMessagingSenderId')?.value?.trim() || '',
            appId: document.getElementById('fbAppId')?.value?.trim() || ''
        };

        if (!config.apiKey || !config.databaseURL) {
            alert("Please enter at least API Key and Database URL");
            return;
        }

        firebaseConfig = config;
        localStorage.setItem("8068_firebase_config_v8", JSON.stringify(config));

        try {
            if (firebaseApp) {
                try { firebaseApp.delete(); } catch(e) {}
                firebaseApp = null;
                firebaseDb = null;
                firebaseInitialized = false;
                isFirebasePrimary = false;
                firebaseListeners.forEach(ref => { try { ref.off(); } catch(e) {} });
                firebaseListeners = [];
            }

            initFirebase().then((success) => {
                if (success) {
                    setupFirebaseRealtimeListener();
                    closeAdminModal();
                    renderApp();
                    alert('✅ Firebase connected successfully! All data will now sync in real-time.');
                } else {
                    alert('❌ Failed to connect to Firebase. Check your configuration and try again.');
                }
            });
        } catch(e) {
            alert('❌ Firebase error: ' + e.message);
        }
    };

    function renderDailyTransactionManagement() {
        if(showLogin) return renderLogin();
        recalculateStaffCommissions();

        const today = new Date().toISOString().slice(0,10);
        let dailyTx = appData.transactions.filter(t => t.date.startsWith(today));
        
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            dailyTx = dailyTx.filter(t => 
                t.id.toLowerCase().includes(q) ||
                t.customer.toLowerCase().includes(q) ||
                t.vehicle.toLowerCase().includes(q) ||
                t.plate.toLowerCase().includes(q)
            );
        }
        
        if (dateRangeStart && dateRangeEnd) {
            dailyTx = dailyTx.filter(t => t.date >= dateRangeStart && t.date <= dateRangeEnd);
        }
        
        dailyTx.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        const totalPages = Math.ceil(dailyTx.length / pageSize);

    // ======================== REPORT SUMMARIES (SIMPLIFIED) ========================
    function renderReportSummaries() {
        if(showLogin) return renderLogin();
        
        const today = new Date();
        const currentMonth = today.getMonth();
        const currentYear = today.getFullYear();
        
        const todayStr = today.toISOString().slice(0,10);
        const dailyTx = appData.transactions.filter(t => t.date.startsWith(todayStr));
        const dailySales = dailyTx.reduce((s,t)=>s+t.total,0);
        const dailyExpenses = appData.expenses.filter(e => e.date === todayStr).reduce((s,e)=>s+e.amount,0);
        const dailyCommission = appData.staff.reduce((sum, s) => sum + (s.dailyCommission || 0), 0);
        
        const weekStart = new Date(today);
        weekStart.setDate(today.getDate() - today.getDay());
        const weekStartStr = weekStart.toISOString().slice(0,10);
        const weekTx = appData.transactions.filter(t => t.date >= weekStartStr);
        const weeklySales = weekTx.reduce((s,t)=>s+t.total,0);
        const weeklyExpenses = appData.expenses.filter(e => e.date >= weekStartStr).reduce((s,e)=>s+e.amount,0);
        
        const monthTx = appData.transactions.filter(t => new Date(t.date).getMonth() === currentMonth && new Date(t.date).getFullYear() === currentYear);
        const monthlySales = monthTx.reduce((s,t)=>s+t.total,0);
        const monthlyExpenses = appData.expenses.filter(e => new Date(e.date).getMonth() === currentMonth && new Date(e.date).getFullYear() === currentYear).reduce((s,e)=>s+e.amount,0);
        const monthlyCommission = appData.staff.reduce((sum, s) => sum + (s.monthlyCommission || 0), 0);
        
        const yearTx = appData.transactions.filter(t => new Date(t.date).getFullYear() === currentYear);
        const yearlySales = yearTx.reduce((s,t)=>s+t.total,0);
        const yearlyExpenses = appData.expenses.filter(e => new Date(e.date).getFullYear() === currentYear).reduce((s,e)=>s+e.amount,0);
        
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const monthName = today.toLocaleString('default', { month: 'long', year: 'numeric' });
        
        let calendarHtml = '';
        for (let i = 0; i < firstDay; i++) {
            calendarHtml += `<div class="calendar-day"></div>`;
        }
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const hasSales = appData.transactions.some(t => t.date.startsWith(dateStr));
            const isToday = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
            let classes = 'calendar-day';
            if (hasSales) classes += ' has-sales';
            if (isToday) classes += ' today';
            const daySales = appData.transactions.filter(t => t.date.startsWith(dateStr)).reduce((s,t)=>s+t.total,0);
            calendarHtml += `<div class="${classes}" title="${dateStr}: ₱${daySales.toFixed(2)}">${d}</div>`;
        }
        
        return `<div class="grid lg:grid-cols-2 gap-6">
            <div class="card-premium p-6">
                <h2 class="text-2xl font-bold mb-4"><i class="fas fa-chart-line"></i> Report Summaries</h2>
                <div class="flex gap-2 mb-4 flex-wrap">
                    <button onclick="setReportPeriod('daily')" class="px-3 py-1 rounded ${reportPeriod === 'daily' ? 'bg-cyan-600' : 'bg-gray-700'} text-sm">Daily</button>
                    <button onclick="setReportPeriod('weekly')" class="px-3 py-1 rounded ${reportPeriod === 'weekly' ? 'bg-cyan-600' : 'bg-gray-700'} text-sm">Weekly</button>
                    <button onclick="setReportPeriod('monthly')" class="px-3 py-1 rounded ${reportPeriod === 'monthly' ? 'bg-cyan-600' : 'bg-gray-700'} text-sm">Monthly</button>
                    <button onclick="setReportPeriod('yearly')" class="px-3 py-1 rounded ${reportPeriod === 'yearly' ? 'bg-cyan-600' : 'bg-gray-700'} text-sm">Yearly</button>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-gray-800 p-3 rounded-lg text-center">
                        <div class="stat-label">${reportPeriod === 'daily' ? 'Today' : reportPeriod === 'weekly' ? 'This Week' : reportPeriod === 'monthly' ? 'This Month' : 'This Year'} Sales</div>
                        <div class="stat-number text-green-400">₱${reportPeriod === 'daily' ? dailySales : reportPeriod === 'weekly' ? weeklySales : reportPeriod === 'monthly' ? monthlySales : yearlySales}</div>
                    </div>
                    <div class="bg-gray-800 p-3 rounded-lg text-center">
                        <div class="stat-label">${reportPeriod === 'daily' ? 'Today' : reportPeriod === 'weekly' ? 'This Week' : reportPeriod === 'monthly' ? 'This Month' : 'This Year'} Expenses</div>
                        <div class="stat-number text-red-400">₱${reportPeriod === 'daily' ? dailyExpenses : reportPeriod === 'weekly' ? weeklyExpenses : reportPeriod === 'monthly' ? monthlyExpenses : yearlyExpenses}</div>
                    </div>
                    <div class="bg-gray-800 p-3 rounded-lg text-center">
                        <div class="stat-label">${reportPeriod === 'daily' ? 'Today' : reportPeriod === 'weekly' ? 'This Week' : reportPeriod === 'monthly' ? 'This Month' : 'This Year'} Commission</div>
                        <div class="stat-number text-yellow-400">₱${reportPeriod === 'daily' ? dailyCommission : reportPeriod === 'weekly' ? dailyCommission : reportPeriod === 'monthly' ? monthlyCommission : dailyCommission}</div>
                    </div>
                    <div class="bg-gray-800 p-3 rounded-lg text-center">
                        <div class="stat-label">${reportPeriod === 'daily' ? 'Today' : reportPeriod === 'weekly' ? 'This Week' : reportPeriod === 'monthly' ? 'This Month' : 'This Year'} Profit</div>
                        <div class="stat-number text-cyan-400">₱${(reportPeriod === 'daily' ? dailySales - dailyExpenses : reportPeriod === 'weekly' ? weeklySales - weeklyExpenses : reportPeriod === 'monthly' ? monthlySales - monthlyExpenses : yearlySales - yearlyExpenses).toFixed(2)}</div>
                    </div>
                </div>
                <div class="bg-gray-800 p-3 rounded-lg">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-bold">${monthName}</span>
                        <span class="text-xs text-gray-400">${reportPeriod === 'daily' ? 'Daily View' : reportPeriod === 'weekly' ? 'Weekly View' : reportPeriod === 'monthly' ? 'Monthly View' : 'Yearly View'}</span>
                    </div>
                    <div class="calendar-grid">
                        <div class="calendar-header">Sun</div>
                        <div class="calendar-header">Mon</div>
                        <div class="calendar-header">Tue</div>
                        <div class="calendar-header">Wed</div>
                        <div class="calendar-header">Thu</div>
                        <div class="calendar-header">Fri</div>
                        <div class="calendar-header">Sat</div>
                        ${calendarHtml}
                    </div>
                    <div class="flex gap-4 mt-3 text-xs">
                        <span><span class="inline-block w-3 h-3 rounded bg-cyan-500/20 border border-cyan-500"></span> Has Sales</span>
                        <span><span class="inline-block w-3 h-3 rounded border border-cyan-400"></span> Today</span>
                    </div>
                </div>
                <div class="flex gap-2 mt-4 flex-wrap">
                    <button onclick="printReportSummary()" class="bg-cyan-600 px-4 py-2 rounded text-sm"><i class="fas fa-print"></i> Print Report</button>
                    <button onclick="exportReportSummaryExcel()" class="excel-export-btn px-4 py-2 rounded text-sm text-white"><i class="fas fa-file-excel"></i> Excel</button>
                    <button onclick="exportReportSummaryPDF()" class="pdf-export-btn px-4 py-2 rounded text-sm text-white"><i class="fas fa-file-pdf"></i> PDF</button>
                </div>
            </div>
            
            <div class="card-premium p-6">
                <h2 class="text-2xl font-bold mb-4"><i class="fas fa-file-invoice-dollar"></i> Staff Commission Report</h2>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-gray-800 p-3 rounded-lg text-center">
                        <div class="stat-label">Total Staff</div>
                        <div class="stat-number text-cyan-400">${appData.staff.length}</div>
                    </div>
                    <div class="bg-gray-800 p-3 rounded-lg text-center">
                        <div class="stat-label">Total Commission</div>
                        <div class="stat-number text-yellow-400">₱${appData.staff.reduce((sum, s) => sum + (s.totalCommission || 0), 0).toFixed(2)}</div>
                    </div>
                </div>
                <div class="mt-4 max-h-48 overflow-y-auto">
                    <table class="w-full text-sm">
                        <thead class="sticky top-0 bg-gray-900 border-b border-yellow-400">
                            <tr><th class="text-left py-1">Staff</th><th class="text-center py-1">Tier</th><th class="text-right py-1">Jobs</th><th class="text-right py-1">Commission</th></tr>
                        </thead>
                        <tbody>
                            ${appData.staff.map(s => `
                                <tr class="border-b border-gray-700">
                                    <td class="py-1">${s.name}</td>
                                    <td class="text-center"><span class="commission-badge">${s.commissionTier}%</span></td>
                                    <td class="text-right">${s.jobsCompleted || 0}</td>
                                    <td class="text-right text-green-400">₱${(s.totalCommission || 0).toFixed(2)}</td>
                                </tr>
                            `).join('')}
                            <tr class="border-t-2 border-yellow-400 font-bold">
                                <td colspan="3" class="py-1 text-right">TOTAL:</td>
                                <td class="text-right text-green-400">₱${appData.staff.reduce((sum, s) => sum + (s.totalCommission || 0), 0).toFixed(2)}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="flex gap-2 mt-4 flex-wrap">
                    <button onclick="printCommissionReport()" class="bg-cyan-600 px-4 py-2 rounded text-sm"><i class="fas fa-print"></i> Print Commission</button>
                    <button onclick="exportCommissionReport()" class="excel-export-btn px-4 py-2 rounded text-sm text-white"><i class="fas fa-file-excel"></i> Excel</button>
                    <button onclick="exportCommissionPDF()" class="pdf-export-btn px-4 py-2 rounded text-sm text-white"><i class="fas fa-file-pdf"></i> PDF</button>
                </div>
            </div>
        </div>`;
    }

        if(showLogin) {
            document.getElementById("mainContent").innerHTML = renderLogin();
            return;

        const main = document.getElementById("mainContent");
        if(!main) return;
        let content = "";
        if(currentView === "dashboard") content = renderDashboard();
        else if(currentView === "pos") content = renderPOS();
        else if(currentView === "openservices") content = renderOpenServices();
        else if(currentView === "customers") content = renderCustomers();
        else if(currentView === "staff") content = renderStaffDashboard();
        else if(currentView === "admin") content = renderAdminDashboard();
        else if(currentView === "reports") content = renderReportSummaries();
        main.innerHTML = content;
        setTimeout(() => {
            document.getElementById('plateInput')?.addEventListener('input', (e) => vehicleInfo.plate = e.target.value);
            document.getElementById('modelInput')?.addEventListener('input', (e) => vehicleInfo.model = e.target.value);
        }, 50);
        updateClock();
        saveToLocal();
    }

        const clockEl = document.getElementById('liveClock');
        if(clockEl) clockEl.textContent = now.toLocaleDateString('en-US', options);
    }

                <button class="nav-btn ${currentView === 'reports' ? 'active' : ''}" onclick="navigate('reports')"><i class="fas fa-chart-bar"></i> Reports</button>

            <!-- Main Content -->
            <div id="mainContent" class="mt-2"></div>

            <footer class="text-center text-gray-500 text-sm mt-8 pt-4 border-t border-gray-800">${appData.systemSettings.companyName} | v8.7 Weekly Commission with Full CRUD | ${firebaseInitialized && isFirebasePrimary ? '🔥 Firebase Primary - Real-time Sync ON' : '📡 Offline Mode'}</footer>
        </div>
    `;

    renderApp();
    saveToLocal();

    console.log('%c8068 CAR SQUARE - Enterprise Management System v8.7 (Weekly Commission with Full CRUD)', 'color: #00d4ff; font-size: 20px; font-weight: bold;');
    console.log(`%cRecords: ${appData.transactions.length} TX | ${appData.customers.length} Customers | ${appData.staff.length} Staff`, 'color: #00ff88;');
    console.log('%c✅ Weekly Commission Report with Look, Edit, Print, Export, Delete actions', 'color: #00ff88;');
    console.log('%c✅ Automatic synchronization from all transactions', 'color: #00ff88;');
    console.log('%c📊 Real-time Sync Enabled | All data stored in one Firebase database', 'color: #ffaa00;');
    console.log(`%c🔥 Firebase: ${firebaseInitialized && isFirebasePrimary ? 'Connected (Primary)' : 'Disconnected (Using localStorage)'}`, 'color: #ffaa00;');
    if (!firebaseInitialized || !isFirebasePrimary) {
        console.log('%c⚠️ Click "Admin" → "System Settings" → "Configure Firebase" to connect', 'color: #ff6b6b;');
    } else {
        console.log('%c✅ Auto-sync enabled - all data saved to Firebase in real-time', 'color: #00ff88;');
    }
</script>
