<body class="text-white">

<div id="root" class="min-h-screen bg-black"></div>

<script>
    // ======================== VERSION ========================
    const SYSTEM_VERSION = '8.8.1';
    const SYSTEM_NAME = '8068 CAR SQUARE';

    // ======================== FIREBASE CONFIGURATION ========================
    let firebaseConfig = {
        apiKey: "AIzaSyDummyKeyForDemoPurposesOnly",
        authDomain: "your-project.firebaseapp.com",
        databaseURL: "https://your-project-default-rtdb.firebaseio.com",
        projectId: "your-project",
        storageBucket: "your-project.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef123456"
    };

    const savedConfig = localStorage.getItem("8068_firebase_config_v8");
    if (savedConfig) {
        try {
            const parsed = JSON.parse(savedConfig);
            if (parsed.apiKey && parsed.apiKey !== "AIzaSyDummyKeyForDemoPurposesOnly") {
                firebaseConfig = parsed;
            }
        } catch(e) {}
    }

    let isUsingDemoConfig = firebaseConfig.apiKey === "AIzaSyDummyKeyForDemoPurposesOnly";

    let firebaseApp = null;
    let firebaseDb = null;
    let firebaseInitialized = false;
    let firebaseListeners = [];
    let firebaseIsSyncing = false;
    let firebaseRetryCount = 0;
    let firebaseTotalSynced = 0;
    const MAX_RETRIES = 5;
    const RETRY_DELAY = 2000;
    let firebaseLogs = [];
    let isFirebasePrimary = false;
    let dataLoaded = false;
    let pendingSyncQueue = [];
    let syncTimer = null;
    let isInitialLoad = true;
    let isOnline = true;
    let chartInstance = null;
    let chartPeriod = 'weekly';

    // ======================== DATA SANITIZATION ========================
    function sanitizeDataForFirebase(data) {
        if (data === undefined) return null;
        if (data === null) return null;
        if (typeof data !== 'object') return data;
        if (Array.isArray(data)) {
            return data.map(item => sanitizeDataForFirebase(item));
        }
        const cleaned = {};
        for (const key in data) {
            if (data[key] === undefined) {
                cleaned[key] = null;
            } else if (data[key] === null) {
                cleaned[key] = null;
            } else if (typeof data[key] === 'object') {
                cleaned[key] = sanitizeDataForFirebase(data[key]);
            } else {
                cleaned[key] = data[key];
            }
        }
        return cleaned;
    }

    function addFirebaseLog(message, type = 'info') {
        const timestamp = new Date().toLocaleTimeString();
        firebaseLogs.push({ message, type, timestamp });
        if (firebaseLogs.length > 200) firebaseLogs.shift();
        updateLogConsole();
        console.log(`[Firebase ${type}] ${message}`);
    }

    function updateLogConsole() {
        const logEl = document.getElementById('firebaseLogConsole');
        if (logEl) {
            logEl.innerHTML = firebaseLogs.slice(-30).map(log => 
                `<div class="${log.type}">[${log.timestamp}] ${log.message}</div>`
            ).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }
    }

    // ======================== FIREBASE INIT ========================
    function initFirebase() {
        addFirebaseLog('🌐 Initializing Firebase...', 'info');
        if (!firebaseConfig.apiKey || firebaseConfig.apiKey === "AIzaSyDummyKeyForDemoPurposesOnly") {
            addFirebaseLog('⚠️ Using demo Firebase config. Please configure your own Firebase project.', 'warn');
        }
        try {
            try { firebaseApp = firebase.app(); addFirebaseLog('✅ Using existing Firebase app', 'success'); } catch(e) {
                firebaseApp = firebase.initializeApp(firebaseConfig);
                addFirebaseLog('✅ Firebase app initialized', 'success');
            }
            firebaseDb = firebase.database();
            return new Promise((resolve) => {
                const connRef = firebaseDb.ref('.info/connected');
                let connectionAttempts = 0;
                const maxConnectionAttempts = 3;
                const checkConnection = () => {
                    connRef.once('value').then((snap) => {
                        if (snap.val() === true) {
                            if (!firebaseInitialized) {
                                firebaseInitialized = true;
                                isFirebasePrimary = true;
                                isOnline = true;
                                addFirebaseLog('✅ Firebase connected as PRIMARY (ONLINE MODE)', 'success');
                                updateFirebaseStatus('online', 'Primary');
                                setupFirebaseRealtimeListener();
                                if (isInitialLoad) {
                                    isInitialLoad = false;
                                    loadAllDataFromFirebase();
                                }
                                resolve(true);
                            }
                        } else {
                            connectionAttempts++;
                            if (connectionAttempts < maxConnectionAttempts) {
                                addFirebaseLog(`🔄 Connection attempt ${connectionAttempts}/${maxConnectionAttempts}...`, 'warn');
                                setTimeout(checkConnection, 2000);
                            } else {
                                addFirebaseLog('⚠️ Could not connect to Firebase. Using local cache.', 'warn');
                                isFirebasePrimary = false;
                                isOnline = false;
                                updateFirebaseStatus('offline', 'Local Cache');
                                loadLocalData();
                                resolve(false);
                            }
                        }
                    }).catch((err) => {
                        connectionAttempts++;
                        if (connectionAttempts < maxConnectionAttempts) {
                            addFirebaseLog(`🔄 Connection error: ${err.message}. Retrying...`, 'warn');
                            setTimeout(checkConnection, 2000);
                        } else {
                            addFirebaseLog(`❌ Firebase connection failed: ${err.message}`, 'error');
                            isFirebasePrimary = false;
                            isOnline = false;
                            updateFirebaseStatus('error', 'Connection Failed');
                            loadLocalData();
                            resolve(false);
                        }
                    });
                };
                connRef.on('value', (snap) => {
                    if (snap.val() === true) {
                        if (!firebaseInitialized) {
                            firebaseInitialized = true;
                            isFirebasePrimary = true;
                            isOnline = true;
                            addFirebaseLog('✅ Firebase connected as PRIMARY (ONLINE MODE)', 'success');
                            updateFirebaseStatus('online', 'Primary');
                            setupFirebaseRealtimeListener();
                            if (isInitialLoad) {
                                isInitialLoad = false;
                                loadAllDataFromFirebase();
                            }
                        } else {
                            isOnline = true;
                            isFirebasePrimary = true;
                            addFirebaseLog('🔄 Firebase reconnected', 'success');
                            updateFirebaseStatus('online', 'Primary');
                            debouncedSync();
                        }
                    } else {
                        if (firebaseInitialized) {
                            addFirebaseLog('⚠️ Firebase disconnected - using local cache', 'warn');
                            isFirebasePrimary = false;
                            isOnline = false;
                            updateFirebaseStatus('offline', 'Local Cache');
                            if (!dataLoaded) { loadLocalData(); }
                        }
                    }
                });
                checkConnection();
            });
        } catch(e) {
            addFirebaseLog(`❌ Init error: ${e.message}`, 'error');
            isFirebasePrimary = false;
            isOnline = false;
            updateFirebaseStatus('error', 'Init Failed');
            loadLocalData();
            return Promise.resolve(false);
        }
    }

    function updateFirebaseStatus(status, message = '') {
        const syncEl = document.getElementById('syncStatus');
        if (syncEl) {
            syncEl.className = 'sync-status';
            if (status === 'online') {
                syncEl.classList.add('synced');
                syncEl.innerHTML = `<i class="fas fa-cloud"></i> Online <span class="sync-count">${firebaseTotalSynced}</span>`;
            } else if (status === 'syncing') {
                syncEl.classList.add('syncing');
                syncEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Syncing...`;
            } else if (status === 'error') {
                syncEl.classList.add('error');
                syncEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> Error`;
            } else {
                syncEl.classList.add('offline');
                syncEl.innerHTML = `<i class="fas fa-sync"></i> Offline`;
            }
        }
        const badgeEl = document.getElementById('firebasePrimaryBadge');
        if (badgeEl) {
            if (status === 'online') {
                badgeEl.style.display = 'inline-flex';
                badgeEl.innerHTML = `<i class="fas fa-check-circle"></i> Firebase Online`;
            } else {
                badgeEl.style.display = 'none';
            }
        }
    }

    // ======================== DATA LOADING ========================
    function loadLocalData() {
        const saved = localStorage.getItem("8068_enterprise_v8");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                Object.assign(appData, parsed);
                if (!appData.commissionMatrix || Object.keys(appData.commissionMatrix).length === 0) {
                    appData.commissionMatrix = initializeCommissionMatrix();
                }
                if (!appData.openServices) appData.openServices = [];
                if (!appData.inventory) appData.inventory = [];
                if (!appData.credits) appData.credits = [];
                if (!appData.users) appData.users = [
                    { id: 1, username: "owner", password: "owner123", role: "Owner", name: "Owner", isActive: true },
                    { id: 2, username: "manager", password: "manager123", role: "Manager", name: "Manager", isActive: true },
                    { id: 3, username: "cashier", password: "cashier123", role: "Cashier", name: "Cashier", isActive: true },
                    { id: 4, username: "staff", password: "staff123", role: "Staff", name: "Staff", isActive: true }
                ];
                if (!appData.currentUser) appData.currentUser = appData.users[0];
                if (!appData.systemSettings.defaultPaymentMethods) {
                    appData.systemSettings.defaultPaymentMethods = ['Cash', 'GCash', 'Maya', 'Credit Card', 'Bank Transfer', 'Credit (Utang)'];
                }
                if (!appData.systemSettings.receiptSize) appData.systemSettings.receiptSize = '58mm';
                if (!appData.systemSettings.receiptHeader) appData.systemSettings.receiptHeader = 'OFFICIAL RECEIPT';
                if (appData.systemSettings.showVAT === undefined) appData.systemSettings.showVAT = false;
                if (!appData.reports) appData.reports = { weekly: [], monthly: [], yearly: [] };
                if (!appData.transactionReports) appData.transactionReports = { daily: [], weekly: [], monthly: [], yearly: [] };
                if (!appData.systemSettings.logoSize) appData.systemSettings.logoSize = 80;
                if (!appData.systemSettings.appIcon) appData.systemSettings.appIcon = null;
                if (!appData.systemSettings.uiLabels) appData.systemSettings.uiLabels = {
                    creditManagement: 'Credit Management',
                    dashboardTitle: 'Dashboard',
                    posTitle: 'Point of Sale',
                    reportsTitle: 'Reports',
                    adminTitle: 'Admin Panel'
                };
                if (!appData.systemSettings.activityLog) appData.systemSettings.activityLog = [];
                if (!appData.systemSettings.auditLog) appData.systemSettings.auditLog = [];
                if (!appData.systemSettings.enableNotifications) appData.systemSettings.enableNotifications = true;
                if (!appData.systemSettings.inactivityTimeout) appData.systemSettings.inactivityTimeout = 30;
                if (!appData.systemSettings.chartDefaultPeriod) appData.systemSettings.chartDefaultPeriod = 'weekly';
                if (!appData.commissionReports) appData.commissionReports = { weekly: [], monthly: [], yearly: [] };
                if (!appData.commissionWeekly) appData.commissionWeekly = { current: null, archives: [] };
                if (!appData.commissionWeekly.current) {
                    appData.commissionWeekly.current = { weekStart: '', weekEnd: '', staff: {}, totals: {} };
                }
                if (!appData.vehicleHistory) appData.vehicleHistory = {};
                dataLoaded = true;
                addFirebaseLog('📂 Loaded from localStorage (cache)', 'info');
                renderApp();
                return true;
            } catch(e) {
                console.error('Error loading local data:', e);
                return false;
            }
        }
        return false;
    }

    function loadAllDataFromFirebase() {
        if (!firebaseDb) return;
        addFirebaseLog('📥 Loading data from Firebase...', 'info');
        updateFirebaseStatus('syncing', 'Loading...');
        firebaseDb.ref('8068_pos_system_v8').once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data) {
                addFirebaseLog(`📦 Received ${Object.keys(data).length} collections from Firebase`, 'info');
                let hasChanges = false;
                const skipKeys = ['lastUpdated', 'version', '_test_connection'];
                Object.keys(data).forEach(key => {
                    if (skipKeys.includes(key)) return;
                    if (appData[key] !== undefined && data[key] !== null) {
                        const localStr = JSON.stringify(appData[key]);
                        const remoteStr = JSON.stringify(data[key]);
                        if (localStr !== remoteStr) {
                            appData[key] = data[key];
                            hasChanges = true;
                        }
                    }
                });
                if (data.users) {
                    data.users.forEach(remoteUser => {
                        const localUser = appData.users.find(u => u.id === remoteUser.id);
                        if (localUser && remoteUser.password) {
                            remoteUser.password = localUser.password;
                        }
                    });
                    if (JSON.stringify(appData.users) !== JSON.stringify(data.users)) {
                        appData.users = data.users;
                        hasChanges = true;
                    }
                }
                if (data.currentUser) {
                    const localUser = appData.users.find(u => u.id === data.currentUser.id);
                    if (localUser) {
                        if (appData.currentUser?.id !== localUser.id) {
                            appData.currentUser = localUser;
                            hasChanges = true;
                        }
                    } else {
                        if (appData.currentUser?.id !== data.currentUser.id) {
                            appData.currentUser = data.currentUser;
                            hasChanges = true;
                        }
                    }
                }
                if (!appData.reports) appData.reports = { weekly: [], monthly: [], yearly: [] };
                if (data.reports) { appData.reports = data.reports; hasChanges = true; }
                if (!appData.transactionReports) appData.transactionReports = { daily: [], weekly: [], monthly: [], yearly: [] };
                if (data.transactionReports) { appData.transactionReports = data.transactionReports; hasChanges = true; }
                if (!appData.commissionReports) appData.commissionReports = { weekly: [], monthly: [], yearly: [] };
                if (data.commissionReports) { appData.commissionReports = data.commissionReports; hasChanges = true; }
                if (!appData.vehicleHistory) appData.vehicleHistory = {};
                if (data.vehicleHistory) { appData.vehicleHistory = data.vehicleHistory; hasChanges = true; }
                if (!appData.systemSettings.auditLog) appData.systemSettings.auditLog = [];
                if (data.systemSettings?.auditLog) { appData.systemSettings.auditLog = data.systemSettings.auditLog; hasChanges = true; }
                if (!appData.systemSettings.logoSize) appData.systemSettings.logoSize = 80;
                if (!appData.systemSettings.uiLabels) {
                    appData.systemSettings.uiLabels = {
                        creditManagement: 'Credit Management',
                        dashboardTitle: 'Dashboard',
                        posTitle: 'Point of Sale',
                        reportsTitle: 'Reports',
                        adminTitle: 'Admin Panel'
                    };
                }
                if (!appData.systemSettings.activityLog) appData.systemSettings.activityLog = [];
                if (!appData.systemSettings.chartDefaultPeriod) appData.systemSettings.chartDefaultPeriod = 'weekly';
                if (!appData.commissionWeekly) appData.commissionWeekly = { current: null, archives: [] };
                if (!appData.commissionWeekly.current) {
                    appData.commissionWeekly.current = { weekStart: '', weekEnd: '', staff: {}, totals: {} };
                }
                dataLoaded = true;
                if (hasChanges) {
                    saveToLocal();
                    addFirebaseLog('✅ Data loaded from Firebase', 'success');
                    updateFirebaseStatus('online', 'Primary');
                    renderApp();
                } else {
                    addFirebaseLog('✅ Data already up to date', 'success');
                    updateFirebaseStatus('online', 'Primary');
                }
                return true;
            } else {
                addFirebaseLog('ℹ️ No data in Firebase, uploading...', 'info');
                return syncToFirebase(true);
            }
        }).catch((error) => {
            addFirebaseLog(`❌ Load error: ${error.message}`, 'error');
            updateFirebaseStatus('error', 'Load Failed');
            loadLocalData();
            return false;
        });
    }

    // ======================== FIREBASE SYNC ========================
    function syncToFirebase(force = false) {
        if (!firebaseDb) {
            addFirebaseLog('❌ Cannot sync: Firebase not ready', 'error');
            return Promise.reject('Firebase not ready');
        }
        if (firebaseIsSyncing && !force) { return Promise.resolve('Already syncing'); }
        if (!isOnline) {
            addFirebaseLog('⏳ Offline - queuing sync for later', 'warn');
            pendingSyncQueue.push({ timestamp: new Date().toISOString() });
            return Promise.resolve('Queued for later');
        }
        firebaseIsSyncing = true;
        updateFirebaseStatus('syncing', 'Syncing...');
        addFirebaseLog('🔄 Syncing to Firebase...', 'info');

        const rawData = {
            services: appData.services || [],
            categories: appData.categories || [],
            customers: appData.customers || [],
            transactions: appData.transactions || [],
            openServices: appData.openServices || [],
            staff: appData.staff || [],
            expenses: appData.expenses || [],
            credits: appData.credits || [],
            inventory: appData.inventory || [],
            systemSettings: appData.systemSettings || {},
            users: appData.users || [],
            currentUser: appData.currentUser || null,
            nextIds: appData.nextIds || {},
            commissionMatrix: appData.commissionMatrix || {},
            reports: appData.reports || { weekly: [], monthly: [], yearly: [] },
            transactionReports: appData.transactionReports || { daily: [], weekly: [], monthly: [], yearly: [] },
            commissionReports: appData.commissionReports || { weekly: [], monthly: [], yearly: [] },
            commissionWeekly: appData.commissionWeekly || { current: null, archives: [] },
            vehicleHistory: appData.vehicleHistory || {},
            lastUpdated: new Date().toISOString(),
            version: SYSTEM_VERSION
        };

        const dataToSync = sanitizeDataForFirebase(rawData);
        const dataSize = JSON.stringify(dataToSync).length;
        addFirebaseLog(`📦 Syncing ${Object.keys(dataToSync).length} collections (${Math.round(dataSize/1024)} KB)`, 'info');

        return firebaseDb.ref('8068_pos_system_v8').set(dataToSync).then(() => {
            firebaseIsSyncing = false;
            firebaseRetryCount = 0;
            firebaseTotalSynced++;
            isOnline = true;
            localStorage.setItem('8068_last_sync_v8', new Date().toISOString());
            addFirebaseLog('✅ Sync completed!', 'success');
            updateFirebaseStatus('online', 'Primary');
            const syncEl = document.getElementById('syncStatus');
            if (syncEl) {
                const countEl = syncEl.querySelector('.sync-count');
                if (countEl) countEl.textContent = firebaseTotalSynced;
            }
            if (pendingSyncQueue.length > 0) {
                pendingSyncQueue = [];
                addFirebaseLog('🔄 Processing queued syncs...', 'info');
            }
            return true;
        }).catch((error) => {
            firebaseIsSyncing = false;
            isOnline = false;
            addFirebaseLog(`❌ Sync error: ${error.message}`, 'error');
            firebaseRetryCount++;
            if (firebaseRetryCount < MAX_RETRIES) {
                addFirebaseLog(`🔄 Retry ${firebaseRetryCount}/${MAX_RETRIES} in ${RETRY_DELAY}ms...`, 'warn');
                updateFirebaseStatus('syncing', `Retry ${firebaseRetryCount}...`);
                return new Promise((resolve) => {
                    setTimeout(() => { resolve(syncToFirebase(true)); }, RETRY_DELAY);
                });
            } else {
                updateFirebaseStatus('error', 'Sync Failed');
                addFirebaseLog('❌ Max retries reached. Will retry later.', 'error');
                pendingSyncQueue.push({ timestamp: new Date().toISOString() });
                return false;
            }
        });
    }

    function debouncedSync() {
        if (syncTimer) { clearTimeout(syncTimer); }
        syncTimer = setTimeout(() => {
            syncTimer = null;
            if (firebaseInitialized && isFirebasePrimary && !firebaseIsSyncing) {
                syncToFirebase();
            } else if (!isOnline) {
                initFirebase().then(() => { if (isOnline) { syncToFirebase(); } });
            }
        }, 1500);
    }

    function setupFirebaseRealtimeListener() {
        if (!firebaseInitialized || !firebaseDb) return;
        firebaseListeners.forEach(ref => { try { ref.off(); } catch(e) {} });
        firebaseListeners = [];
        addFirebaseLog('🔌 Setting up real-time listener...', 'info');
        const ref = firebaseDb.ref('8068_pos_system_v8');
        ref.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && !firebaseIsSyncing && isFirebasePrimary && isOnline) {
                addFirebaseLog('🔄 Real-time update received', 'info');
                let hasChanges = false;
                const skipKeys = ['lastUpdated', 'version', '_test_connection'];
                Object.keys(data).forEach(key => {
                    if (skipKeys.includes(key)) return;
                    if (appData[key] !== undefined && data[key] !== null) {
                        const localStr = JSON.stringify(appData[key]);
                        const remoteStr = JSON.stringify(data[key]);
                        if (localStr !== remoteStr) {
                            appData[key] = data[key];
                            hasChanges = true;
                        }
                    }
                });
                if (hasChanges) {
                    saveToLocal();
                    addFirebaseLog('✅ Data updated from real-time sync', 'success');
                    updateFirebaseStatus('online', 'Primary');
                    renderApp();
                }
            }
        }, (error) => {
            addFirebaseLog(`⚠️ Listener error: ${error.message}`, 'warn');
            isOnline = false;
            updateFirebaseStatus('offline', 'Listener Lost');
        });
        firebaseListeners.push(ref);
        addFirebaseLog('✅ Real-time listener active', 'success');
    }

    // ======================== WEEK DATE UTILITIES ========================
    function getWeekStart(date) {
        const d = new Date(date);
        d.setHours(0, 0, 0, 0);
        const day = d.getDay();
        d.setDate(d.getDate() - day);
        return d;
    }

    function getWeekEnd(date) {
        const d = getWeekStart(date);
        d.setDate(d.getDate() + 6);
        d.setHours(23, 59, 59, 999);
        return d;
    }

    function getWeekLabel(date) {
        const start = getWeekStart(date);
        const end = getWeekEnd(date);
        const options = { month: 'long', day: 'numeric', year: 'numeric' };
        return `Sunday, ${start.toLocaleDateString('en-US', options)} – Saturday, ${end.toLocaleDateString('en-US', options)}`;
    }

    function getWeekId(date) {
        const start = getWeekStart(date);
        const year = start.getFullYear();
        const jan1 = new Date(year, 0, 1);
        const days = Math.floor((start - jan1) / (24 * 60 * 60 * 1000));
        const weekNum = Math.ceil((days + 1) / 7);
        return `${year}-W${String(weekNum).padStart(2, '0')}`;
    }

    function getDateRangeForPeriod(period, customStart, customEnd) {
        const now = new Date();
        let start, end;
        if (period === 'daily') {
            const d = new Date(now);
            d.setHours(0, 0, 0, 0);
            start = d;
            end = new Date(d);
            end.setHours(23, 59, 59, 999);
        } else if (period === 'weekly') {
            start = getWeekStart(now);
            end = getWeekEnd(now);
        } else if (period === 'monthly') {
            start = new Date(now.getFullYear(), now.getMonth(), 1);
            end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            end.setHours(23, 59, 59, 999);
        } else if (period === 'yearly') {
            start = new Date(now.getFullYear(), 0, 1);
            end = new Date(now.getFullYear(), 11, 31);
            end.setHours(23, 59, 59, 999);
        } else if (period === 'custom') {
            start = customStart ? new Date(customStart) : new Date(0);
            end = customEnd ? new Date(customEnd) : new Date();
            if (start) start.setHours(0, 0, 0, 0);
            if (end) end.setHours(23, 59, 59, 999);
        }
        return { start, end };
    }

    // ======================== TRANSACTION REPORTS ENGINE ========================
    function generateTransactionReports() {
        // Group transactions by daily, weekly, monthly, yearly
        const tx = appData.transactions || [];
        const dailyMap = {};
        const weeklyMap = {};
        const monthlyMap = {};
        const yearlyMap = {};

        tx.forEach(t => {
            const d = new Date(t.date);
            const dateKey = d.toISOString().slice(0,10);
            const weekId = getWeekId(d);
            const monthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            const yearKey = `${d.getFullYear()}`;

            // Daily
            if (!dailyMap[dateKey]) dailyMap[dateKey] = [];
            dailyMap[dateKey].push(t);

            // Weekly
            if (!weeklyMap[weekId]) {
                const ws = getWeekStart(d);
                const we = getWeekEnd(d);
                weeklyMap[weekId] = { weekStart: ws.toISOString(), weekEnd: we.toISOString(), weekLabel: getWeekLabel(d), transactions: [] };
            }
            weeklyMap[weekId].transactions.push(t);

            // Monthly
            if (!monthlyMap[monthKey]) monthlyMap[monthKey] = { month: monthKey, transactions: [] };
            monthlyMap[monthKey].transactions.push(t);

            // Yearly
            if (!yearlyMap[yearKey]) yearlyMap[yearKey] = { year: yearKey, transactions: [] };
            yearlyMap[yearKey].transactions.push(t);
        });

        // Convert to arrays and sort
        const dailyReports = Object.keys(dailyMap).sort().map(key => ({
            date: key,
            transactions: dailyMap[key]
        }));

        const weeklyReports = Object.keys(weeklyMap).sort((a,b) => a.localeCompare(b)).map(key => ({
            weekId: key,
            weekStart: weeklyMap[key].weekStart,
            weekEnd: weeklyMap[key].weekEnd,
            weekLabel: weeklyMap[key].weekLabel,
            transactions: weeklyMap[key].transactions
        }));

        const monthlyReports = Object.keys(monthlyMap).sort().map(key => ({
            month: key,
            transactions: monthlyMap[key].transactions
        }));

        const yearlyReports = Object.keys(yearlyMap).sort().map(key => ({
            year: key,
            transactions: yearlyMap[key].transactions
        }));

        appData.transactionReports.daily = dailyReports;
        appData.transactionReports.weekly = weeklyReports;
        appData.transactionReports.monthly = monthlyReports;
        appData.transactionReports.yearly = yearlyReports;

        // Also update legacy reports for compatibility
        appData.reports.daily = dailyReports;
        appData.reports.weekly = weeklyReports;
        appData.reports.monthly = monthlyReports;
        appData.reports.yearly = yearlyReports;

        saveToLocal();
        return { daily: dailyReports, weekly: weeklyReports, monthly: monthlyReports, yearly: yearlyReports };
    }

    function getTransactionsForPeriod(period, customStart, customEnd) {
        const range = getDateRangeForPeriod(period, customStart, customEnd);
        if (!range.start || !range.end) return [];
        const startStr = range.start.toISOString();
        const endStr = range.end.toISOString();
        return appData.transactions.filter(t => {
            const d = new Date(t.date);
            return d >= range.start && d <= range.end;
        });
    }

    function calculateTransactionSummary(transactions) {
        const summary = {
            totalTransactions: transactions.length,
            totalGrossSales: 0,
            totalCash: 0,
            totalGCash: 0,
            totalCard: 0,
            totalCredit: 0,
            totalOther: 0,
            totalDiscount: 0,
            totalCommission: 0,
            averageTransactionValue: 0,
            highestTransaction: 0,
            lowestTransaction: Infinity,
            paymentBreakdown: {}
        };

        transactions.forEach(t => {
            const amount = t.total || 0;
            summary.totalGrossSales += amount;
            summary.totalDiscount += (t.discount || 0);
            
            // Payment method breakdown
            const method = t.paymentMethod || 'Other';
            if (method === 'Cash') summary.totalCash += amount;
            else if (method === 'GCash' || method === 'Maya') summary.totalGCash += amount;
            else if (method === 'Credit Card' || method === 'Card') summary.totalCard += amount;
            else if (method === 'Credit (Utang)' || t.isCredit) summary.totalCredit += amount;
            else summary.totalOther += amount;

            if (!summary.paymentBreakdown[method]) summary.paymentBreakdown[method] = 0;
            summary.paymentBreakdown[method] += amount;

            // Commission
            if (t.staffCommissions) {
                const comm = Object.values(t.staffCommissions).reduce((s, st) => s + (st.commission || 0), 0);
                summary.totalCommission += comm;
            }

            if (amount > summary.highestTransaction) summary.highestTransaction = amount;
            if (amount < summary.lowestTransaction) summary.lowestTransaction = amount;
        });

        if (transactions.length > 0) {
            summary.averageTransactionValue = summary.totalGrossSales / transactions.length;
        } else {
            summary.lowestTransaction = 0;
        }

        return summary;
    }

    function getVehicleHistory(plate) {
        if (!plate) return null;
        const normalizedPlate = plate.toUpperCase().trim();
        if (!appData.vehicleHistory) appData.vehicleHistory = {};
        
        // Build history from transactions
        const tx = appData.transactions.filter(t => 
            t.plate && t.plate.toUpperCase().trim() === normalizedPlate
        ).sort((a,b) => new Date(a.date) - new Date(b.date));

        if (tx.length === 0) return null;

        const history = {
            plate: normalizedPlate,
            firstVisit: tx[0]?.date || null,
            latestVisit: tx[tx.length-1]?.date || null,
            totalVisits: tx.length,
            totalSpent: tx.reduce((s, t) => s + (t.total || 0), 0),
            services: [],
            staff: [],
            payments: [],
            remarks: [],
            transactions: tx
        };

        tx.forEach(t => {
            t.items.forEach(item => {
                if (!history.services.includes(item.serviceName)) {
                    history.services.push(item.serviceName);
                }
            });
            if (t.remarks) history.remarks.push({ date: t.date, remark: t.remarks });
            if (t.paymentMethod && !history.payments.includes(t.paymentMethod)) {
                history.payments.push(t.paymentMethod);
            }
            t.items.forEach(item => {
                if (item.assignedStaff) {
                    item.assignedStaff.forEach(st => {
                        if (!history.staff.includes(st.name)) {
                            history.staff.push(st.name);
                        }
                    });
                }
            });
        });

        appData.vehicleHistory[normalizedPlate] = history;
        saveToLocal();
        return history;
    }

    // ======================== RECALCULATE ALL COMMISSIONS ========================
    function recalculateAllCommissions() {
        console.log('🔄 Recalculating all commission reports...');
        appData.staff.forEach(s => {
            s.totalCommission = 0;
            s.jobsCompleted = 0;
            s.salesGenerated = 0;
            s.weeklyBreakdown = { Sunday: 0, Monday: 0, Tuesday: 0, Wednesday: 0, Thursday: 0, Friday: 0, Saturday: 0 };
            s.weeklyCommission = 0;
            s.monthlyCommission = 0;
            s.yearlyCommission = 0;
        });

        const weeklyGroups = {};
        const monthlyGroups = {};
        const yearlyGroups = {};

        appData.transactions.forEach(t => {
            if (!t.staffCommissions) return;
            const txDate = new Date(t.date);
            const weekId = getWeekId(txDate);
            const monthKey = `${txDate.getFullYear()}-${String(txDate.getMonth() + 1).padStart(2, '0')}`;
            const yearKey = `${txDate.getFullYear()}`;
            const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayName = dayNames[txDate.getDay()];

            if (!weeklyGroups[weekId]) {
                weeklyGroups[weekId] = { 
                    weekStart: getWeekStart(txDate).toISOString(),
                    weekEnd: getWeekEnd(txDate).toISOString(),
                    weekLabel: getWeekLabel(txDate),
                    staff: {},
                    totals: { commission: 0, sales: 0, jobs: 0, transactions: 0 },
                    dailyBreakdown: {}

            }
            if (!monthlyGroups[monthKey]) {
                monthlyGroups[monthKey] = { month: monthKey, staff: {}, totals: { commission: 0, sales: 0, jobs: 0, transactions: 0 } };
            }
            if (!yearlyGroups[yearKey]) {
                yearlyGroups[yearKey] = { year: yearKey, staff: {}, totals: { commission: 0, sales: 0, jobs: 0, transactions: 0 } };
            }
            if (!weeklyGroups[weekId].dailyBreakdown[dayName]) {
                weeklyGroups[weekId].dailyBreakdown[dayName] = { commission: 0, sales: 0, jobs: 0 };
            }

            Object.entries(t.staffCommissions).forEach(([staffId, data]) => {
                const sid = parseInt(staffId);

                if (!staffMember) return;
                const commission = data.commission || 0;

                staffMember.jobsCompleted = (staffMember.jobsCompleted || 0) + jobs;
                staffMember.salesGenerated = (staffMember.salesGenerated || 0) + sales;
                staffMember.weeklyBreakdown[dayName] = (staffMember.weeklyBreakdown[dayName] || 0) + commission;

                        commission: 0, jobs: 0, sales: 0,
                        daily: { Sunday: 0, Monday: 0, Tuesday: 0, Wednesday: 0, Thursday: 0, Friday: 0, Saturday: 0 }
                    };
                }
                weeklyGroups[weekId].staff[sid].commission += commission;
                weeklyGroups[weekId].staff[sid].jobs += jobs;
                weeklyGroups[weekId].staff[sid].sales += sales;
                weeklyGroups[weekId].staff[sid].daily[dayName] = (weeklyGroups[weekId].staff[sid].daily[dayName] || 0) + commission;
                weeklyGroups[weekId].totals.commission += commission;
                weeklyGroups[weekId].totals.sales += sales;
                weeklyGroups[weekId].totals.jobs += jobs;
                weeklyGroups[weekId].totals.transactions += 1;
                weeklyGroups[weekId].dailyBreakdown[dayName].commission += commission;
                weeklyGroups[weekId].dailyBreakdown[dayName].sales += sales;
                weeklyGroups[weekId].dailyBreakdown[dayName].jobs += jobs;

                // Monthly
                if (!monthlyGroups[monthKey].staff[sid]) {
                    monthlyGroups[monthKey].staff[sid] = {
                        name: staffMember.name, position: staffMember.position, tier: staffMember.commissionTier,
                        commission: 0, jobs: 0, sales: 0
                    };
                }
                monthlyGroups[monthKey].staff[sid].commission += commission;
                monthlyGroups[monthKey].staff[sid].jobs += jobs;
                monthlyGroups[monthKey].staff[sid].sales += sales;
                monthlyGroups[monthKey].totals.commission += commission;
                monthlyGroups[monthKey].totals.sales += sales;
                monthlyGroups[monthKey].totals.jobs += jobs;
                monthlyGroups[monthKey].totals.transactions += 1;

                // Yearly
                if (!yearlyGroups[yearKey].staff[sid]) {
                    yearlyGroups[yearKey].staff[sid] = {
                        name: staffMember.name, position: staffMember.position, tier: staffMember.commissionTier,
                        commission: 0, jobs: 0, sales: 0
                    };
                }
                yearlyGroups[yearKey].staff[sid].commission += commission;
                yearlyGroups[yearKey].staff[sid].jobs += jobs;
                yearlyGroups[yearKey].staff[sid].sales += sales;
                yearlyGroups[yearKey].totals.commission += commission;
                yearlyGroups[yearKey].totals.sales += sales;
                yearlyGroups[yearKey].totals.jobs += jobs;
                yearlyGroups[yearKey].totals.transactions += 1;
            });
        });

        // Process open services
        appData.openServices.forEach(s => {
            if (s.completedAt && s.commissionProcessed && s.pendingCommission) {
                const txDate = new Date(s.completedAt);
                const weekId = getWeekId(txDate);
                const monthKey = `${txDate.getFullYear()}-${String(txDate.getMonth() + 1).padStart(2, '0')}`;
                const yearKey = `${txDate.getFullYear()}`;
                const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                const dayName = dayNames[txDate.getDay()];

                if (!weeklyGroups[weekId]) {

                    };
                }
                if (!weeklyGroups[weekId].dailyBreakdown[dayName]) {
                    weeklyGroups[weekId].dailyBreakdown[dayName] = { commission: 0, sales: 0, jobs: 0 };
                }
                if (!monthlyGroups[monthKey]) {
                    monthlyGroups[monthKey] = { month: monthKey, staff: {}, totals: { commission: 0, sales: 0, jobs: 0, transactions: 0 } };
                }
                if (!yearlyGroups[yearKey]) {
                    yearlyGroups[yearKey] = { year: yearKey, staff: {}, totals: { commission: 0, sales: 0, jobs: 0, transactions: 0 } };
                }

                const staffMap = s.pendingCommission.staffMap || {};
                Object.entries(staffMap).forEach(([staffId, data]) => {
                    const sid = parseInt(staffId);
                    const staffMember = appData.staff.find(st => st.id === sid);
                    if (!staffMember) return;
                    const commission = data.commission || 0;
                    const jobs = data.jobs || 1;
                    const sales = s.total || 0;

                    staffMember.totalCommission = (staffMember.totalCommission || 0) + commission;
                    staffMember.jobsCompleted = (staffMember.jobsCompleted || 0) + jobs;
                    staffMember.salesGenerated = (staffMember.salesGenerated || 0) + sales;
                    staffMember.weeklyBreakdown[dayName] = (staffMember.weeklyBreakdown[dayName] || 0) + commission;
                    staffMember.weeklyCommission = (staffMember.weeklyCommission || 0) + commission;
                    staffMember.monthlyCommission = (staffMember.monthlyCommission || 0) + commission;
                    staffMember.yearlyCommission = (staffMember.yearlyCommission || 0) + commission;

                    if (!weeklyGroups[weekId].staff[sid]) {
                        weeklyGroups[weekId].staff[sid] = {

                    weeklyGroups[weekId].totals.sales += sales;
                    weeklyGroups[weekId].totals.jobs += jobs;
                    weeklyGroups[weekId].totals.transactions += 1;
                    weeklyGroups[weekId].dailyBreakdown[dayName].commission += commission;
                    weeklyGroups[weekId].dailyBreakdown[dayName].sales += sales;
                    weeklyGroups[weekId].dailyBreakdown[dayName].jobs += jobs;

                    if (!monthlyGroups[monthKey].staff[sid]) {
                        monthlyGroups[monthKey].staff[sid] = {
                            name: staffMember.name, position: staffMember.position, tier: staffMember.commissionTier,
                            commission: 0, jobs: 0, sales: 0
                        };
                    }
                    monthlyGroups[monthKey].staff[sid].commission += commission;
                    monthlyGroups[monthKey].staff[sid].jobs += jobs;
                    monthlyGroups[monthKey].staff[sid].sales += sales;
                    monthlyGroups[monthKey].totals.commission += commission;
                    monthlyGroups[monthKey].totals.sales += sales;
                    monthlyGroups[monthKey].totals.jobs += jobs;
                    monthlyGroups[monthKey].totals.transactions += 1;

                    if (!yearlyGroups[yearKey].staff[sid]) {
                        yearlyGroups[yearKey].staff[sid] = {
                            name: staffMember.name, position: staffMember.position, tier: staffMember.commissionTier,
                            commission: 0, jobs: 0, sales: 0
                        };
                    }
                    yearlyGroups[yearKey].staff[sid].commission += commission;
                    yearlyGroups[yearKey].staff[sid].jobs += jobs;
                    yearlyGroups[yearKey].staff[sid].sales += sales;
                    yearlyGroups[yearKey].totals.commission += commission;
                    yearlyGroups[yearKey].totals.sales += sales;
                    yearlyGroups[yearKey].totals.jobs += jobs;
                    yearlyGroups[yearKey].totals.transactions += 1;
                });
            }
        });

        const sortedWeekIds = Object.keys(weeklyGroups).sort((a, b) => {
            const dateA = new Date(weeklyGroups[a].weekStart);
            const dateB = new Date(weeklyGroups[b].weekStart);
            return dateB - dateA;
        });
        appData.commissionReports.weekly = sortedWeekIds.map(id => weeklyGroups[id]);

        const sortedMonths = Object.keys(monthlyGroups).sort((a, b) => b.localeCompare(a));
        appData.commissionReports.monthly = sortedMonths.map(key => monthlyGroups[key]);

        const sortedYears = Object.keys(yearlyGroups).sort((a, b) => b.localeCompare(a));
        appData.commissionReports.yearly = sortedYears.map(key => yearlyGroups[key]);

        const now = new Date();
        const currentWeekId = getWeekId(now);
        if (weeklyGroups[currentWeekId]) {
            appData.commissionWeekly.current = {
                weekStart: weeklyGroups[currentWeekId].weekStart,
                weekEnd: weeklyGroups[currentWeekId].weekEnd,
                weekLabel: weeklyGroups[currentWeekId].weekLabel,
                staff: weeklyGroups[currentWeekId].staff,
                totals: weeklyGroups[currentWeekId].totals,
                dailyBreakdown: weeklyGroups[currentWeekId].dailyBreakdown
            };
        } else {
            const weekStart = getWeekStart(now);
            const weekEnd = getWeekEnd(now);
            appData.commissionWeekly.current = {
                weekStart: weekStart.toISOString(),
                weekEnd: weekEnd.toISOString(),
                weekLabel: getWeekLabel(now),
                staff: {},

    // ======================== EXPORT FUNCTIONS ========================
    function getFilteredTransactions(period) {
        const now = new Date();
        let filtered = [];
        if (period === 'daily') {
            const todayStr = now.toISOString().slice(0,10);
            filtered = appData.transactions.filter(t => t.date.startsWith(todayStr));
        } else if (period === 'weekly') {
            const weekStart = getWeekStart(now);
            const weekStartStr = weekStart.toISOString().slice(0,10);
            filtered = appData.transactions.filter(t => t.date >= weekStartStr);
        } else if (period === 'monthly') {
            const month = now.getMonth();
            const year = now.getFullYear();
            filtered = appData.transactions.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === month && d.getFullYear() === year;
            });
        } else if (period === 'yearly') {
            const year = now.getFullYear();
            filtered = appData.transactions.filter(t => new Date(t.date).getFullYear() === year);
        }
        return filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function generateExcel(data, columns, title, filename) {
        const wb = XLSX.utils.book_new();
        const wsData = [columns.map(c => c.header)];
        data.forEach(row => {
            wsData.push(columns.map(c => row[c.key] !== undefined ? row[c.key] : ''));
        });
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        ws['!cols'] = columns.map(() => ({ wch: 20 }));
        XLSX.utils.book_append_sheet(wb, ws, title);
        XLSX.writeFile(wb, `${filename}_${new Date().toISOString().slice(0,10)}.xlsx`);
        return true;
    }

    function generateCSV(data, columns, filename) {
        let csv = columns.map(c => c.header).join(',') + '\n';
        data.forEach(row => {
            csv += columns.map(c => `"${row[c.key] !== undefined ? row[c.key] : ''}"`).join(',') + '\n';
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${filename}_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        return true;
    }

    function generatePDF(data, columns, title, filename, logo, logoSize) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        const size = logoSize || 80;
        if (logo) {
            try {
                doc.addImage(logo, 'JPEG', pageWidth/2 - size/2, 5, size, size/2);
            } catch(e) {}
        }
        doc.setFontSize(16);
        doc.text(title, pageWidth/2, 30, { align: 'center' });
        doc.setFontSize(10);
        doc.text(`Generated: ${new Date().toLocaleString()}`, pageWidth/2, 38, { align: 'center' });
        doc.text(`Company: ${appData.systemSettings.companyName}`, pageWidth/2, 44, { align: 'center' });
        const tableData = data.map(row => columns.map(c => row[c.key] !== undefined ? row[c.key] : ''));
        doc.autoTable({
            head: [columns.map(c => c.header)],
            body: tableData,
            startY: 50,
            styles: { fontSize: 8, cellPadding: 2 },
            headStyles: { fillColor: [0, 212, 255], textColor: [0,0,0], fontStyle: 'bold' },
            alternateRowStyles: { fillColor: [240, 240, 240] },
            didDrawPage: function(data) {
                doc.setFontSize(8);
                doc.text(`Page ${data.pageNumber}`, pageWidth - 20, doc.internal.pageSize.getHeight() - 10);
            }
        });
        doc.save(`${filename}_${new Date().toISOString().slice(0,10)}.pdf`);
        return true;
    }

    function addToCart(serviceId, size, price, serviceName, remark, staff) {
        posCart.push({ 
            serviceId, serviceName, variant: size, price, quantity: 1, total: price, 
            assignedStaff: staff || [], remarks: remark || "" 
        });
        renderApp();
    }

    function removeCartItem(idx) { 
        if (idx >= 0 && idx < posCart.length) { posCart.splice(idx, 1); renderApp(); }
    }

    function updateCartQuantity(idx, qty) { 
        if (qty > 0 && idx >= 0 && idx < posCart.length) { 
            posCart[idx].quantity = parseInt(qty); 
            posCart[idx].total = posCart[idx].price * posCart[idx].quantity; 
            renderApp(); 
        }
    }

    function addItemRemark(idx) {

        if (idx >= 0 && idx < posCart.length) {

    // Complete Sale
    function completeSaleWrapper() {
        selectedPayment = document.getElementById('paymentMethod')?.value || "Cash";
        cashTendered = parseFloat(document.getElementById('cashTenderedInput')?.value || 0);
        discount = parseFloat(document.getElementById('discountInput')?.value || 0);
        loyaltyPointsUsed = parseFloat(document.getElementById('loyaltyUse')?.value || 0);
        cartRemarks = document.getElementById('cartRemarksInput')?.value || "";
        completeSale();
    }

    function completeSale() {
        if(posCart.length === 0) { alert("Please add services to cart!"); return; }
        const total = calcTotal();
        const isCredit = selectedPayment === 'Credit (Utang)';
        if (isCredit) {
            if (!selectedCustomer) { alert("Please select a customer for credit transaction!"); return; }
            appData.credits.push({
                id: 'CR-' + new Date().getFullYear() + '-' + (appData.nextIds.credit++),
                customerName: selectedCustomer.name,
                contact: selectedCustomer.mobile || '',
                transactionId: 'PENDING-' + Date.now(),
                amount: total,
                paid: 0,
                balance: total,
                date: new Date().toISOString().slice(0,10),
                status: 'pending'
            });
        }
        if(selectedPayment === "Cash" && cashTendered < total) { alert("Insufficient cash!"); return; }
        const staffCommissionMap = new Map();
        posCart.forEach(item => { 
            if(item.assignedStaff) {
                item.assignedStaff.forEach(staff => { 
                    const current = staffCommissionMap.get(staff.id) || { commission: 0, jobs: 0, name: staff.name, tier: staff.commissionTier }; 
                    current.commission += staff.splitCommission; 
                    current.jobs += 1; 
                    staffCommissionMap.set(staff.id, current); 
                });
            }
        });
        const transaction = { 
            id: generateReceiptNo(), 
            date: new Date().toISOString(), 
            customer: selectedCustomer ? selectedCustomer.name : "Walk-in Customer", 
            customerId: selectedCustomer?.id || null,
            vehicle: vehicleInfo.model || "N/A", 
            plate: vehicleInfo.plate || "N/A", 
            items: posCart.map(i => ({ ...i })), 
            staffCommissions: Object.fromEntries([...staffCommissionMap.entries()]), 
            subtotal: calcSubtotal(), 
            discount, 
            loyaltyUsed: loyaltyPointsUsed, 
            total, 
            paymentMethod: selectedPayment,
            isCredit: isCredit,
            cashTendered: selectedPayment === "Cash" ? cashTendered : total, 
            change: selectedPayment === "Cash" ? (cashTendered - total) : 0,
            remarks: cartRemarks + (isCredit ? ' (CREDIT - PENDING)' : ''),
            itemRemarks: posCart.map(i => ({ service: i.serviceName, remark: i.remarks || 'None' }))
        };
        appData.transactions.unshift(transaction);
        staffCommissionMap.forEach((data, staffId) => { 
            const staff = appData.staff.find(s => s.id === staffId); 
            if(staff) { 
                staff.totalCommission = (staff.totalCommission || 0) + data.commission; 
                staff.jobsCompleted = (staff.jobsCompleted || 0) + data.jobs; 
                staff.salesGenerated = (staff.salesGenerated || 0) + transaction.items.filter(i => i.assignedStaff?.some(s => s.id === staffId)).reduce((sum, i) => sum + i.total, 0); 
            } 
        });
        if(selectedCustomer && !isCredit) { 
            let earnedPoints = Math.floor(total * appData.systemSettings.loyaltyPointsPerPeso); 
            selectedCustomer.loyaltyPoints = (selectedCustomer.loyaltyPoints || 0) + earnedPoints; 
            const idx = appData.customers.findIndex(c=>c.id === selectedCustomer.id); 
            if(idx !== -1) appData.customers[idx].loyaltyPoints = selectedCustomer.loyaltyPoints; 
        }
        saveToLocal();
        recalculateAllCommissions();
        generateTransactionReports();
        addActivityLog('Sale Completed', `Transaction ${transaction.id} - ₱${total.toFixed(2)} - ${selectedPayment}`);
        addAuditLog('create', `Transaction ${transaction.id}`, `Sale completed: ₱${total.toFixed(2)} by ${appData.currentUser?.name}`);
        alert(`✅ SALE COMPLETED!\nTotal: ₱${total.toFixed(2)}${isCredit ? '\n⚠️ CREDIT (UTANG) - PENDING PAYMENT' : ''}`);
        printReceipt(transaction);
        posCart = []; selectedCustomer = null; vehicleInfo = { plate: "", model: "", size: "Medium" }; 
        discount = 0; loyaltyPointsUsed = 0; cashTendered = 0; cartRemarks = "";
        renderApp();
    }

    function updateOpenServiceStatus(id, status) {
        const service = appData.openServices.find(s => s.id === id);
        if(service) {
            service.status = status;
            if(status === 'completed') {
                service.completedAt = new Date().toISOString();
                processOpenServiceCommission(service, true);
                addActivityLog('Open Service Completed', `${service.customer} - ₱${service.total.toFixed(2)}`);

                recalculateAllCommissions();
                generateTransactionReports();
            }
            saveToLocal();
            renderApp();
        }
    }

    function processOpenServiceCommission(service, suppressTransaction = false) {
        if (service.commissionProcessed) return;
        if (!service.staff || service.staff.length === 0) return;
        const staffCommissionMap = new Map();
        service.items.forEach(item => {
            if (item.assignedStaff && item.assignedStaff.length > 0) {
                item.assignedStaff.forEach(staff => {
                    const commissionAmt = getCommissionAmount(item.serviceName, item.variant, staff.commissionTier);
                    const splitCommission = item.assignedStaff.length === 2 ? commissionAmt / 2 : commissionAmt;
                    const current = staffCommissionMap.get(staff.id) || { commission: 0, jobs: 0, name: staff.name, tier: staff.commissionTier, serviceTotal: 0 };
                    current.commission += splitCommission;
                    current.jobs += 1;
                    current.serviceTotal += item.total;
                    staffCommissionMap.set(staff.id, current);
                });
            }
        });
        service.pendingCommission = {
            staffMap: Object.fromEntries([...staffCommissionMap.entries()].map(([id, data]) => [id, { commission: data.commission, tier: data.tier, name: data.name, jobs: data.jobs }])),
            total: service.total
        };
        if (!suppressTransaction) {
            finalizeServiceTransaction(service);
        } else {
            service.commissionProcessed = true;
            saveToLocal();
        }
    }

    function finalizeServiceTransaction(service) {
        if (!service.pendingCommission) {
            processOpenServiceCommission(service, false);
            if (!service.pendingCommission) return;
        }
        const staffMap = service.pendingCommission.staffMap || {};
        const transaction = {
            id: generateReceiptNo(),
            date: service.completedAt || new Date().toISOString(),
            customer: service.customer,
            vehicle: service.vehicle,
            plate: service.plate,
            items: service.items.map(i => ({ ...i })),
            staffCommissions: staffMap,
            subtotal: service.total,
            discount: 0,
            loyaltyUsed: 0,
            total: service.total,
            paymentMethod: 'Open Service (Completed)',
            cashTendered: service.total,
            change: 0,
            remarks: service.remarks + ' (Completed Service)',
            isOpenService: true,
            openServiceId: service.id,
            isCommissionAutoGenerated: true
        };
        const existingTx = appData.transactions.find(t => t.openServiceId === service.id && t.isCommissionAutoGenerated);
        if (!existingTx) {
            appData.transactions.unshift(transaction);
            Object.entries(staffMap).forEach(([staffId, data]) => {
                const staffMember = appData.staff.find(s => s.id === parseInt(staffId));
                if(staffMember) {
                    staffMember.totalCommission = (staffMember.totalCommission || 0) + data.commission;
                    staffMember.jobsCompleted = (staffMember.jobsCompleted || 0) + data.jobs;
                    staffMember.salesGenerated = (staffMember.salesGenerated || 0) + service.total;
                }
            });
            service.commissionProcessed = true;
            service.transactionId = transaction.id;
            delete service.pendingCommission;
            saveToLocal();
            recalculateAllCommissions();
            generateTransactionReports();
            renderApp();
        }
    }

    function completeOpenServicePayment(id, paymentMethod, cashTendered) {
        const service = appData.openServices.find(s => s.id === id);
        if(!service) return;
        const total = service.total;
        if(paymentMethod === "Cash" && cashTendered < total) { alert("Insufficient cash!"); return; }
        if (!service.commissionProcessed) { processOpenServiceCommission(service, false); } 
        else if (service.commissionProcessed && !service.transactionId) { finalizeServiceTransaction(service); }
        const existingTx = appData.transactions.find(t => t.openServiceId === service.id && t.isCommissionAutoGenerated);
        if (existingTx) {
            existingTx.paymentMethod = paymentMethod;
            existingTx.cashTendered = paymentMethod === "Cash" ? cashTendered : total;
            existingTx.change = paymentMethod === "Cash" ? (cashTendered - total) : 0;
            existingTx.isCredit = paymentMethod === 'Credit (Utang)';
            if (paymentMethod === 'Credit (Utang)') {
                existingTx.remarks = (existingTx.remarks || '') + ' (CREDIT - PENDING)';
            }
            saveToLocal();
        } else {
            const transaction = {
                id: generateReceiptNo(),
                date: new Date().toISOString(),
                customer: service.customer,
                vehicle: service.vehicle,
                plate: service.plate,
                items: service.items.map(i => ({ ...i })),
                subtotal: total,
                discount: 0,
                loyaltyUsed: 0,
                total: total,
                paymentMethod: paymentMethod,
                cashTendered: paymentMethod === "Cash" ? cashTendered : total,
                change: paymentMethod === "Cash" ? (cashTendered - total) : 0,
                remarks: service.remarks + (paymentMethod === 'Credit (Utang)' ? ' (CREDIT - PENDING)' : ''),
                isOpenService: true,
                openServiceId: service.id,
                staffCommissions: service.staffCommissions || {}
            };
            appData.transactions.unshift(transaction);
            saveToLocal();
            recalculateAllCommissions();
        }
        if (paymentMethod === 'Credit (Utang)') {
            appData.credits.push({
                id: 'CR-' + new Date().getFullYear() + '-' + (appData.nextIds.credit++),
                customerName: service.customer,
                contact: '',
                transactionId: existingTx ? existingTx.id : 'PENDING-' + Date.now(),
                amount: total,
                paid: 0,
                balance: total,
                date: new Date().toISOString().slice(0,10),
                status: 'pending'
            });
            saveToLocal();
        }
        service.paidAt = new Date().toISOString();
        service.status = 'paid';
        saveToLocal();
        recalculateAllCommissions();
        generateTransactionReports();
        addActivityLog('Payment Completed', `${service.customer} - ₱${total.toFixed(2)} - ${paymentMethod}`);
        addAuditLog('update', `Open Service ${service.id}`, `Payment completed: ₱${total.toFixed(2)} via ${paymentMethod}`);
        alert(`✅ Payment Completed!\nTotal: ₱${total.toFixed(2)}`);
        const txToPrint = appData.transactions.find(t => t.openServiceId === service.id);
        if (txToPrint) printReceipt(txToPrint);
        appData.openServices = appData.openServices.filter(s => s.id !== id);
        renderApp();
    }

    function getChartData(period) {
        const now = new Date();
        let labels = [], data = [], periodLabel = '';
        if (period === 'daily') {
            const days = 30;
            for (let i = days - 1; i >= 0; i--) {
                const d = new Date(now); d.setDate(now.getDate() - i);
                const dateStr = d.toISOString().slice(0,10);
                labels.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
                const dayTx = appData.transactions.filter(t => t.date.startsWith(dateStr));
                data.push(dayTx.reduce((s, t) => s + t.total, 0));
            }
            periodLabel = 'Daily (30 Days)';
        } else if (period === 'weekly') {
            const weeks = 12;
            for (let i = weeks - 1; i >= 0; i--) {
                const weekStart = getWeekStart(new Date(now.getTime() - 7 * i * 24 * 60 * 60 * 1000));
                const weekEnd = getWeekEnd(weekStart);
                const weekStartStr = weekStart.toISOString().slice(0,10);
                labels.push(`W${weeks - i}`);
                const weekTx = appData.transactions.filter(t => t.date >= weekStartStr && t.date <= weekEnd.toISOString().slice(0,10));
                data.push(weekTx.reduce((s, t) => s + t.total, 0));
            }
            periodLabel = 'Weekly (12 Weeks)';
        } else if (period === 'monthly') {
            const months = 12;
            for (let i = months - 1; i >= 0; i--) {
                const d = new Date(now); d.setMonth(now.getMonth() - i);
                const month = d.getMonth(), year = d.getFullYear();
                labels.push(d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' }));
                const monthTx = appData.transactions.filter(t => {
                    const td = new Date(t.date);
                    return td.getMonth() === month && td.getFullYear() === year;
                });
                data.push(monthTx.reduce((s, t) => s + t.total, 0));
            }
            periodLabel = 'Monthly (12 Months)';
        }
        return { labels, data, periodLabel };
    }

                    if (window.chartInstance) { window.chartInstance.destroy(); }
                    const gradient = ctx.createLinearGradient(0, 0, 0, 280);
                    gradient.addColorStop(0, 'rgba(0, 212, 255, 0.3)');
                    gradient.addColorStop(0.5, 'rgba(0, 212, 255, 0.1)');
                    gradient.addColorStop(1, 'rgba(0, 212, 255, 0)');
                    window.chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: window.chartLabels,
                            datasets: [{
                                label: 'Sales (₱)',
                                data: window.chartValues,
                                borderColor: '#00d4ff',
                                backgroundColor: gradient,
                                fill: true,
                                tension: 0.4,
                                pointBackgroundColor: '#00d4ff',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 2,
                                pointRadius: 3,
                                pointHoverRadius: 6,
                                borderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: 'rgba(10, 10, 10, 0.9)',
                                    borderColor: '#00d4ff',
                                    borderWidth: 1,
                                    titleColor: '#fff',
                                    bodyColor: '#00d4ff',
                                    callbacks: { label: function(context) { return '₱' + context.parsed.y.toFixed(2); } }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
                                    ticks: { color: '#888', font: { size: 10 }, callback: function(value) { return '₱' + value; } }
                                },

                                    grid: { display: false, drawBorder: false },
                                    ticks: { color: '#888', font: { size: 10 }, maxTicksLimit: 15 }
                                }
                            },
                            interaction: { intersect: false, mode: 'index' }
                        }
                    });
                    const periodLabelEl = document.getElementById('chartPeriodLabel');
                    if (periodLabelEl) {
                        const periods = { daily: 'Daily (30 Days)', weekly: 'Weekly (12 Weeks)', monthly: 'Monthly (12 Months)' };
                        periodLabelEl.textContent = periods[window.chartPeriod] || 'Weekly (12 Weeks)';
                    }
                    document.querySelectorAll('.chart-period-btn').forEach(btn => {
                        btn.classList.toggle('active', btn.textContent.toLowerCase() === window.chartPeriod);
                    });
                }
                window.updateChartPeriod = function(period) {
                    window.chartPeriod = period;
                    appData.systemSettings.chartDefaultPeriod = period;
                    saveToLocal();
                    const data = getChartData(period);
                    window.chartLabels = data.labels;
                    window.chartValues = data.data;
                    if (window.chartInstance) {
                        window.chartInstance.data.labels = window.chartLabels;
                        window.chartInstance.data.datasets[0].data = window.chartValues;
                        window.chartInstance.update();
                        const periodLabelEl = document.getElementById('chartPeriodLabel');
                        if (periodLabelEl) {
                            const periods = { daily: 'Daily (30 Days)', weekly: 'Weekly (12 Weeks)', monthly: 'Monthly (12 Months)' };
                            periodLabelEl.textContent = periods[period] || 'Weekly (12 Weeks)';
                        }
                        document.querySelectorAll('.chart-period-btn').forEach(btn => {
                            btn.classList.toggle('active', btn.textContent.toLowerCase() === period);
                        });
                    }
                };
                setTimeout(initChart, 100);
            <\/script>
        `;
    }

    // ======================== TRANSACTION MANAGEMENT ========================
    function renderDailyTransactionManagement() {
        if(showLogin) return renderLogin();
        recalculateAllCommissions();
        generateTransactionReports();

        // Get filtered transactions based on period
        const period = document.getElementById('reportPeriodFilter')?.value || 'daily';
        const staffFilter = document.getElementById('staffFilter')?.value || '';
        const serviceFilter = document.getElementById('serviceFilter')?.value || '';
        const paymentFilter = document.getElementById('paymentFilter')?.value || '';
        const searchTerm = document.getElementById('txSearchInput')?.value || searchQuery || '';
        const dateStart = document.getElementById('dateStartFilter')?.value || dateRangeStart || '';
        const dateEnd = document.getElementById('dateEndFilter')?.value || dateRangeEnd || '';

        // Get transactions for the selected period
        let filteredTx = [];
        if (period === 'daily') {
            const todayStr = new Date().toISOString().slice(0,10);
            filteredTx = appData.transactions.filter(t => t.date.startsWith(todayStr));
        } else if (period === 'weekly') {
            const weekStart = getWeekStart(new Date());
            const weekStartStr = weekStart.toISOString().slice(0,10);
            filteredTx = appData.transactions.filter(t => t.date >= weekStartStr);
        } else if (period === 'monthly') {
            const now = new Date();
            const month = now.getMonth();
            const year = now.getFullYear();
            filteredTx = appData.transactions.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === month && d.getFullYear() === year;
            });
        } else if (period === 'yearly') {
            const year = new Date().getFullYear();
            filteredTx = appData.transactions.filter(t => new Date(t.date).getFullYear() === year);
        } else if (period === 'custom') {
            if (dateStart && dateEnd) {
                filteredTx = appData.transactions.filter(t => t.date >= dateStart && t.date <= dateEnd);
            } else {
                filteredTx = [...appData.transactions];
            }
        } else {
            filteredTx = [...appData.transactions];
        }

        // Apply filters
        if (searchTerm) {
            const q = searchTerm.toLowerCase();
            filteredTx = filteredTx.filter(t => 
                t.id.toLowerCase().includes(q) ||
                t.customer.toLowerCase().includes(q) ||
                t.vehicle.toLowerCase().includes(q) ||
                t.plate.toLowerCase().includes(q) ||
                (t.items && t.items.some(i => i.serviceName.toLowerCase().includes(q)))
            );
        }
        if (staffFilter) {
            filteredTx = filteredTx.filter(t => 
                t.items && t.items.some(i => i.assignedStaff && i.assignedStaff.some(s => s.name === staffFilter))
            );
        }
        if (serviceFilter) {
            filteredTx = filteredTx.filter(t => 
                t.items && t.items.some(i => i.serviceName === serviceFilter)
            );
        }
        if (paymentFilter) {
            filteredTx = filteredTx.filter(t => t.paymentMethod === paymentFilter);
        }

        // Sort
        filteredTx.sort((a, b) => {
            if (sortField === 'date') {
                return sortDirection === 'desc' ? new Date(b.date) - new Date(a.date) : new Date(a.date) - new Date(b.date);
            } else if (sortField === 'total') {
                return sortDirection === 'desc' ? b.total - a.total : a.total - b.total;
            } else if (sortField === 'customer') {
                return sortDirection === 'desc' ? b.customer.localeCompare(a.customer) : a.customer.localeCompare(b.customer);
            } else {
                return sortDirection === 'desc' ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date);
            }
        });

        const totalPages = Math.ceil(filteredTx.length / pageSize);
        const startIdx = (currentPage - 1) * pageSize;
        const paginatedTx = filteredTx.slice(startIdx, startIdx + pageSize);

        // Calculate summary
        const summary = calculateTransactionSummary(filteredTx);

        let txRows = paginatedTx.map((t, idx) => {
            const staffNames = t.items.flatMap(i => i.assignedStaff?.map(s => s.name) || []).filter((v,i,a) => a.indexOf(v)===i).join(', ') || 'Unassigned';
            const size = t.items.map(i => i.variant).join(', ') || 'N/A';
            const serviceAvailed = t.items.map(i => i.serviceName).join(', ') || 'N/A';
            const isCredit = t.paymentMethod === 'Credit (Utang)' || t.isCredit;
            let txCommission = 0;
            if (t.staffCommissions) {
                txCommission = Object.values(t.staffCommissions).reduce((sum, st) => sum + (st.commission || 0), 0);

                                t.paymentMethod === 'GCash' || t.paymentMethod === 'Maya' ? 'payment-gcash' :
                                t.paymentMethod === 'Credit Card' ? 'payment-card' :
                                t.paymentMethod === 'Credit (Utang)' ? 'payment-credit' : 'payment-other';

                <td class="py-2 text-center text-xs text-gray-400">${startIdx + idx + 1}</td>

            </tr>`;
        }).join('');

        const staffOptions = appData.staff.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
